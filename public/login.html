<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Aprender Ensinando</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h1 class="login-title">🎓 Aprender Ensinando</h1>
        <p class="login-subtitle">Sistema de Gestão Psicopedagógica</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email" class="form-label required">E-mail</label>
          <input 
            type="email" 
            id="email" 
            class="form-control" 
            placeholder="seu@email.com"
            required
            autocomplete="email"
          >
        </div>

        <div class="form-group">
          <label for="password" class="form-label required">Senha</label>
          <input 
            type="password" 
            id="password" 
            class="form-control" 
            placeholder="••••••••"
            required
            autocomplete="current-password"
          >
        </div>

        <div id="errorMessage" class="alert alert-danger hidden"></div>

        <button type="submit" class="btn btn-primary btn-block">
          Entrar
        </button>

        <div class="text-center mt-3">
          <a href="#" id="forgotPassword" class="text-secondary" style="text-decoration: none; font-size: 0.875rem;">
            Esqueceu a senha?
          </a>
        </div>
      </form>

      <div class="text-center mt-4" style="padding-top: 1rem; border-top: 1px solid var(--border-color);">
        <p class="text-secondary" style="font-size: 0.875rem;">
          Primeiro acesso? 
          <a href="#" id="createAccount" style="color: var(--accent); text-decoration: none;">
            Criar conta
          </a>
        </p>
      </div>
    </div>
  </div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Version: 2.0.0 - Fix duplicated supabase -->
  <script>
    // Configuração Supabase
    const SUPABASE_URL = 'https://ukjxekdwumfxilphrrmb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVranhla2R3dW1meGlscGhycm1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NjM1ODQsImV4cCI6MjA4ODAzOTU4NH0.c68Cp_HYU53aeSoZyNUM6RiHSDFq0Y0sPxJEAyq1nQk';
    
    // Inicializar cliente Supabase
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    // Funções auxiliares
    function showLoading(show) {
      if (show) {
        const loader = document.createElement('div');
        loader.id = 'loader';
        loader.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:9999';
        loader.innerHTML = '<div style="color:white;font-size:1.5rem">Carregando...</div>';
        document.body.appendChild(loader);
      } else {
        const loader = document.getElementById('loader');
        if (loader) loader.remove();
      }
    }

    // Login - Elementos do DOM
    const loginForm = document.getElementById('loginForm');
    const errorMessage = document.getElementById('errorMessage');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');

    // Verificar se já está logado
    (async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        window.location.href = '/dashboard.html';
      }
    })();

    // Login
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      errorMessage.classList.add('hidden');
      
      const submitBtn = loginForm.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Entrando...';

      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email,
          password
        });

        if (error) throw error;

        // Login bem-sucedido
        window.location.href = '/dashboard.html';
        
      } catch (error) {
        console.error('Erro no login:', error);
        errorMessage.textContent = error.message === 'Invalid login credentials'
          ? 'E-mail ou senha incorretos'
          : 'Erro ao fazer login. Tente novamente.';
        errorMessage.classList.remove('hidden');
        
        submitBtn.disabled = false;
        submitBtn.textContent = 'Entrar';
      }
    });

    // Esqueci a senha
    document.getElementById('forgotPassword').addEventListener('click', async (e) => {
      e.preventDefault();
      
      const email = emailInput.value.trim();
      
      if (!email) {
        alert('Digite seu e-mail primeiro');
        emailInput.focus();
        return;
      }

      try {
        const { error } = await supabase.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + '/reset-password.html'
        });

        if (error) throw error;

        alert('Link de recuperação enviado para seu e-mail!');
      } catch (error) {
        console.error('Erro ao recuperar senha:', error);
        alert('Erro ao enviar e-mail de recuperação');
      }
    });

    // Criar conta
    document.getElementById('createAccount').addEventListener('click', async (e) => {
      e.preventDefault();
      
      const email = prompt('Digite seu e-mail:');
      if (!email) return;

      const password = prompt('Digite uma senha (mínimo 6 caracteres):');
      if (!password || password.length < 6) {
        alert('Senha deve ter no mínimo 6 caracteres');
        return;
      }

      const nome = prompt('Digite seu nome completo:');
      if (!nome) return;

      try {
        showLoading(true);

        // Criar usuário no Supabase Auth
        const { data: authData, error: authError } = await supabase.auth.signUp({
          email,
          password,
          options: {
            data: {
              nome: nome
            }
          }
        });

        if (authError) throw authError;

        // Criar perfil na tabela usuarios
        const { error: profileError } = await supabase
          .from('usuarios')
          .insert({
            id: authData.user.id,
            email: email,
            nome: nome
          });

        if (profileError) throw profileError;

        showLoading(false);
        alert('Conta criada com sucesso! Faça login para continuar.');
        emailInput.value = email;
        passwordInput.value = '';
        
      } catch (error) {
        showLoading(false);
        console.error('Erro ao criar conta:', error);
        alert('Erro ao criar conta: ' + error.message);
      }
    });
  </script>
</body>
</html>
