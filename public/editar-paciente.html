<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Aluno - Aprender Ensinando</title>
  <link rel="stylesheet" href="/css/modern-layout.css">
  <style>
    .foto-container {
      text-align: center;
      margin-bottom: 2rem;
    }

    .foto-container {
      text-align: center;
      margin-bottom: 2rem;
    }

    .foto-preview {
      width: 150px;
      height: 150px;
      border-radius: var(--radius-full);
      object-fit: cover;
      border: 4px solid var(--primary);
      margin-bottom: 1rem;
      display: block;
      margin-left: auto;
      margin-right: auto;
      box-shadow: var(--shadow-md);
    }

    .foto-placeholder {
      width: 150px;
      height: 150px;
      border-radius: var(--radius-full);
      background: var(--bg-tertiary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      margin: 0 auto 1rem;
      border: 4px dashed var(--border);
    }

    .btn-upload {
      background: var(--primary);
      color: white;
      padding: 0.625rem 1.5rem;
      border-radius: var(--radius-md);
      cursor: pointer;
      display: inline-block;
      font-weight: 600;
      transition: all var(--transition-fast);
    }

    .btn-upload:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .form-section {
      background: white;
      border-radius: var(--radius-xl);
      padding: var(--spacing-xl);
      margin-bottom: var(--spacing-lg);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-light);
    }

    .form-section-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--spacing-lg);
      padding-bottom: var(--spacing-md);
      border-bottom: 2px solid var(--border-light);
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: var(--spacing-lg);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-sm);
    }

    .form-label {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .form-label.required::after {
      content: " *";
      color: #EF4444;
    }

    .form-control {
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 0.9375rem;
      transition: all var(--transition-fast);
      background: white;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 190, 205, 0.1);
    }

    textarea.form-control {
      resize: vertical;
      min-height: 80px;
    }

    .btn-group {
      display: flex;
      gap: var(--spacing-md);
      margin-top: var(--spacing-xl);
    }

    .btn-danger {
      background: #EF4444;
      color: white;
    }

    .btn-danger:hover {
      background: #DC2626;
    }

    /* Botões Grandes e Modernos */
    .btn-action-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 2px solid var(--border-light);
    }

    .btn-large {
      padding: 1.25rem 2rem;
      font-size: 1.125rem;
      font-weight: 700;
      border-radius: var(--radius-xl);
      border: none;
      cursor: pointer;
      transition: all var(--transition-base);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      box-shadow: var(--shadow-md);
      text-decoration: none;
    }

    .btn-large:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-xl);
    }

    .btn-large:active {
      transform: translateY(-1px);
    }

    .btn-save {
      background: linear-gradient(135deg, #10B981 0%, #059669 100%);
      color: white;
    }

    .btn-save:hover {
      background: linear-gradient(135deg, #059669 0%, #047857 100%);
    }

    .btn-cancel {
      background: linear-gradient(135deg, #6B7280 0%, #4B5563 100%);
      color: white;
    }

    .btn-cancel:hover {
      background: linear-gradient(135deg, #4B5563 0%, #374151 100%);
    }

    .btn-large .emoji {
      font-size: 1.5rem;
    }

    @media (max-width: 768px) {
      .btn-action-group {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
    }

    .status-group {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .status-option {
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }

    .status-option input[type="radio"] {
      display: none;
    }

    .status-option.ativo {
      border-color: #48bb78;
      background: #f0fff4;
    }

    .status-option.inativo {
      border-color: #ed8936;
      background: #fffaf0;
    }

    .status-option.concluido {
      border-color: #4299e1;
      background: #ebf8ff;
    }

    .status-option input[type="radio"]:checked + label {
      font-weight: bold;
    }

    .campos-conclusao {
      display: none;
      margin-top: 1rem;
      padding: 1rem;
      background: #f7fafc;
      border-radius: 8px;
    }

    .campos-conclusao.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-container"></div>

    <div class="main-content">
      <div id="header-container"></div>

      <div class="page-content">
        <div id="loadingState" style="text-align: center; padding: 3rem;">
          <p>⏳ Carregando dados...</p>
        </div>

        <form id="formEditarPaciente" style="display: none;">
      <!-- Foto -->
      <div class="card">
        <h2>📸 Foto do Aluno</h2>
        <div class="foto-container">
          <img id="fotoPreview" class="foto-preview" style="display: none;">
          <div id="fotoPlaceholder" class="foto-placeholder">
            👤
          </div>
          <label for="fotoInput" class="btn-upload">
            📷 Escolher Foto
          </label>
          <input type="file" id="fotoInput" accept="image/*" style="display: none;">
          <p style="color: #718096; font-size: 0.875rem; margin-top: 0.5rem;">
            Formatos: JPG, PNG (máx 5MB)
          </p>
        </div>
      </div>

      <!-- Status -->
      <div class="card">
        <h2>📊 Status do Atendimento</h2>
        <div class="status-group">
          <div class="status-option ativo" onclick="selecionarStatus('ativo')">
            <input type="radio" name="status" id="statusAtivo" value="ativo" checked>
            <label for="statusAtivo">
              <div style="font-size: 2rem;">🟢</div>
              <strong>Ativo</strong>
              <p style="font-size: 0.875rem; color: #718096;">Em atendimento</p>
            </label>
          </div>

          <div class="status-option inativo" onclick="selecionarStatus('inativo')">
            <input type="radio" name="status" id="statusInativo" value="inativo">
            <label for="statusInativo">
              <div style="font-size: 2rem;">⏸️</div>
              <strong>Inativo</strong>
              <p style="font-size: 0.875rem; color: #718096;">Pausado</p>
            </label>
          </div>

          <div class="status-option concluido" onclick="selecionarStatus('concluido')">
            <input type="radio" name="status" id="statusConcluido" value="concluido">
            <label for="statusConcluido">
              <div style="font-size: 2rem;">✅</div>
              <strong>Concluído</strong>
              <p style="font-size: 0.875rem; color: #718096;">Finalizado</p>
            </label>
          </div>
        </div>

        <!-- Campos que aparecem ao marcar como Concluído -->
        <div id="camposConclusao" class="campos-conclusao">
          <div class="form-group">
            <label for="dataConclusao" class="form-label">Data de Conclusão</label>
            <input type="date" id="dataConclusao" class="form-control">
          </div>

          <div class="form-group">
            <label for="motivoConclusao" class="form-label">Motivo da Conclusão</label>
            <textarea id="motivoConclusao" class="form-control" rows="3" 
              placeholder="Ex: Problema resolvido, alta médica, finalização do tratamento..."></textarea>
          </div>
        </div>
      </div>

      <!-- Dados do Paciente (todos os campos do cadastro) -->
      <div class="card">
        <h2>👤 Dados do Aluno</h2>
        
        <div class="form-group">
          <label for="nome" class="form-label required">Nome Completo</label>
          <input type="text" id="nome" class="form-control" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="dataNascimento" class="form-label">Data de Nascimento</label>
            <input type="date" id="dataNascimento" class="form-control">
          </div>
        </div>

        <div class="form-group">
          <label for="nomeMae" class="form-label">Nome da Mãe</label>
          <input type="text" id="nomeMae" class="form-control">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="telefone" class="form-label">Telefone Principal</label>
            <input type="tel" id="telefone" class="form-control">
          </div>

          <div class="form-group">
            <label for="telefone2" class="form-label">Telefone Secundário</label>
            <input type="tel" id="telefone2" class="form-control">
          </div>
        </div>

        <div class="form-group">
          <label for="endereco" class="form-label">Endereço</label>
          <input type="text" id="endereco" class="form-control">
        </div>
      </div>

      <!-- Seção: Dados dos Responsáveis -->
      <div class="card-section">
        <h3 style="color: var(--primary); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
          <span style="font-size: 1.5rem;">👨‍👩‍👧</span>
          <span>Dados dos Responsáveis</span>
        </h3>

        <div class="grid grid-2">
          <div class="form-group">
            <label for="nomePai" class="form-label">Nome do Pai</label>
            <input type="text" id="nomePai" class="form-control">
          </div>

          <div class="form-group">
            <label for="nomeMaeResp" class="form-label">Nome da Mãe</label>
            <input type="text" id="nomeMaeResp" class="form-control">
          </div>
        </div>

        <div class="grid grid-2">
          <div class="form-group">
            <label for="nomeAvo" class="form-label">Nome do(a) Avô/Avó</label>
            <input type="text" id="nomeAvo" class="form-control">
          </div>

          <div class="form-group">
            <label for="nomeOutroResponsavel" class="form-label">Outro Responsável</label>
            <input type="text" id="nomeOutroResponsavel" class="form-control">
          </div>
        </div>

        <div class="form-group">
          <label for="responsavelPrincipal" class="form-label">Responsável Principal</label>
          <select id="responsavelPrincipal" class="form-control">
            <option value="">Selecione...</option>
            <option value="Pai">Pai</option>
            <option value="Mãe">Mãe</option>
            <option value="Avô/Avó">Avô/Avó</option>
            <option value="Outro">Outro</option>
          </select>
        </div>

        <div class="form-group">
          <label for="emailResp" class="form-label">E-mail do Responsável</label>
          <input type="email" id="emailResp" class="form-control">
        </div>
      </div>

      <!-- Seção: Perguntas da Entrevista -->
      <div class="card-section">
        <h3 style="color: var(--primary); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
          <span style="font-size: 1.5rem;">📋</span>
          <span>Perguntas da Entrevista Inicial</span>
        </h3>

        <div class="form-group">
          <label for="pergunta1" class="form-label">1. Qual a queixa inicial?</label>
          <textarea id="pergunta1" class="form-control" rows="3"></textarea>
        </div>

        <div class="form-group">
          <label for="pergunta2" class="form-label">2. Quando começou?</label>
          <textarea id="pergunta2" class="form-control" rows="2"></textarea>
        </div>

        <div class="form-group">
          <label for="pergunta3" class="form-label">3. Como os responsáveis se sentem?</label>
          <textarea id="pergunta3" class="form-control" rows="2"></textarea>
        </div>

        <div class="form-group">
          <label for="pergunta4" class="form-label">4. Expectativas em relação à escola?</label>
          <textarea id="pergunta4" class="form-control" rows="2"></textarea>
        </div>

        <div class="form-group">
          <label for="pergunta5" class="form-label">5. Pergunta adicional 1</label>
          <textarea id="pergunta5" class="form-control" rows="2"></textarea>
        </div>

        <div class="form-group">
          <label for="pergunta6" class="form-label">6. Pergunta adicional 2</label>
          <textarea id="pergunta6" class="form-control" rows="2"></textarea>
        </div>

        <div class="form-group">
          <label for="pergunta7" class="form-label">7. Pergunta adicional 3</label>
          <textarea id="pergunta7" class="form-control" rows="2"></textarea>
        </div>

        <div class="form-group">
          <label for="pergunta8" class="form-label">8. Pergunta adicional 4</label>
          <textarea id="pergunta8" class="form-control" rows="2"></textarea>
        </div>

        <div class="form-group">
          <label for="pergunta9" class="form-label">9. Pergunta adicional 5</label>
          <textarea id="pergunta9" class="form-control" rows="2"></textarea>
        </div>

        <div class="form-group">
          <label for="pergunta10" class="form-label">10. Pergunta adicional 6</label>
          <textarea id="pergunta10" class="form-control" rows="2"></textarea>
        </div>

        <div class="form-group">
          <label for="pergunta11" class="form-label">11. Pergunta adicional 7</label>
          <textarea id="pergunta11" class="form-control" rows="2"></textarea>
        </div>

        <div class="form-group">
          <label for="pergunta12" class="form-label">12. Pergunta adicional 8</label>
          <textarea id="pergunta12" class="form-control" rows="2"></textarea>
        </div>

        <div class="form-group">
          <label for="pergunta13" class="form-label">13. Pergunta adicional 9</label>
          <textarea id="pergunta13" class="form-control" rows="2"></textarea>
        </div>
      </div>

      <!-- Botões Modernos -->
      <div class="btn-action-group">
        <button type="submit" class="btn-large btn-save">
          <span class="emoji">💾</span>
          <span>Salvar Alterações</span>
        </button>
        <a href="/alunos.html" class="btn-large btn-cancel">
          <span class="emoji">❌</span>
          <span>Cancelar</span>
        </a>
      </div>
    </form>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase } from './js/supabase.js';

    const urlParams = new URLSearchParams(window.location.search);
    const pacienteId = urlParams.get('id');

    if (!pacienteId) {
      alert('ID do paciente não fornecido!');
      window.location.href = 'alunos.html';
    }

    let paciente = null;
    let fotoFile = null;

    // Carregar dados do paciente
    async function carregarPaciente() {
      try {
        const { data, error } = await supabase
          .from('pacientes')
          .select('*')
          .eq('id', pacienteId)
          .single();

        if (error) throw error;

        paciente = data;
        preencherFormulario();

        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('formEditarPaciente').style.display = 'block';

      } catch (error) {
        console.error('Erro ao carregar paciente:', error);
        alert('Erro ao carregar dados!');
        window.location.href = 'alunos.html';
      }
    }

    // Preencher formulário com dados existentes
    function preencherFormulario() {
      document.getElementById('nome').value = paciente.nome || '';
      document.getElementById('dataNascimento').value = paciente.data_nascimento || '';
      document.getElementById('nomeMae').value = paciente.nome_mae || '';
      document.getElementById('telefone').value = paciente.telefone || '';
      document.getElementById('telefone2').value = paciente.telefone2 || '';
      document.getElementById('endereco').value = paciente.endereco || '';

      // Dados dos Responsáveis
      document.getElementById('nomePai').value = paciente.nome_pai || '';
      document.getElementById('nomeMaeResp').value = paciente.nome_mae || '';
      document.getElementById('nomeAvo').value = paciente.nome_avo || '';
      document.getElementById('nomeOutroResponsavel').value = paciente.nome_outro_responsavel || '';
      document.getElementById('responsavelPrincipal').value = paciente.responsavel_principal || '';
      document.getElementById('emailResp').value = paciente.email || '';

      // Perguntas da Entrevista
      document.getElementById('pergunta1').value = paciente.pergunta_1 || '';
      document.getElementById('pergunta2').value = paciente.pergunta_2 || '';
      document.getElementById('pergunta3').value = paciente.pergunta_3 || '';
      document.getElementById('pergunta4').value = paciente.pergunta_4 || '';
      document.getElementById('pergunta5').value = paciente.pergunta_5 || '';
      document.getElementById('pergunta6').value = paciente.pergunta_6 || '';
      document.getElementById('pergunta7').value = paciente.pergunta_7 || '';
      document.getElementById('pergunta8').value = paciente.pergunta_8 || '';
      document.getElementById('pergunta9').value = paciente.pergunta_9 || '';
      document.getElementById('pergunta10').value = paciente.pergunta_10 || '';
      document.getElementById('pergunta11').value = paciente.pergunta_11 || '';
      document.getElementById('pergunta12').value = paciente.pergunta_12 || '';
      document.getElementById('pergunta13').value = paciente.pergunta_13 || '';

      // Foto
      if (paciente.foto_url) {
        document.getElementById('fotoPreview').src = paciente.foto_url;
        document.getElementById('fotoPreview').style.display = 'block';
        document.getElementById('fotoPlaceholder').style.display = 'none';
      }

      // Status
      const status = paciente.status || 'ativo';
      document.getElementById(`status${status.charAt(0).toUpperCase() + status.slice(1)}`).checked = true;
      selecionarStatus(status);

      if (status === 'concluido') {
        document.getElementById('dataConclusao').value = paciente.data_conclusao || '';
        document.getElementById('motivoConclusao').value = paciente.motivo_conclusao || '';
      }
    }

    // Preview de foto
    document.getElementById('fotoInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      // Validar tamanho (5MB)
      if (file.size > 5 * 1024 * 1024) {
        alert('Arquivo muito grande! Máximo 5MB');
        return;
      }

      // Validar tipo
      if (!file.type.startsWith('image/')) {
        alert('Arquivo deve ser uma imagem!');
        return;
      }

      fotoFile = file;

      // Preview
      const reader = new FileReader();
      reader.onload = (e) => {
        document.getElementById('fotoPreview').src = e.target.result;
        document.getElementById('fotoPreview').style.display = 'block';
        document.getElementById('fotoPlaceholder').style.display = 'none';
      };
      reader.readAsDataURL(file);
    });

    // Selecionar status
    window.selecionarStatus = function(status) {
      document.querySelectorAll('.status-option').forEach(el => {
        el.style.borderWidth = '2px';
      });

      document.querySelector(`.status-option.${status}`).style.borderWidth = '4px';
      document.getElementById(`status${status.charAt(0).toUpperCase() + status.slice(1)}`).checked = true;

      // Mostrar/esconder campos de conclusão
      if (status === 'concluido') {
        document.getElementById('camposConclusao').classList.add('show');
      } else {
        document.getElementById('camposConclusao').classList.remove('show');
      }
    };

    // Salvar
    document.getElementById('formEditarPaciente').addEventListener('submit', async (e) => {
      e.preventDefault();

      const btnSubmit = e.target.querySelector('button[type="submit"]');
      btnSubmit.disabled = true;
      btnSubmit.textContent = '⏳ Salvando...';

      try {
        let fotoUrl = paciente.foto_url;

        // Upload de foto (se tiver)
        if (fotoFile) {
          const fileExt = fotoFile.name.split('.').pop();
          const fileName = `${pacienteId}.${fileExt}`;
          const filePath = `pacientes/${fileName}`;

          const { error: uploadError } = await supabase.storage
            .from('fotos')
            .upload(filePath, fotoFile, { upsert: true });

          if (uploadError) throw uploadError;

          const { data: urlData } = supabase.storage
            .from('fotos')
            .getPublicUrl(filePath);

          fotoUrl = urlData.publicUrl;
        }

        // Dados para atualizar
        const status = document.querySelector('input[name="status"]:checked').value;
        const updateData = {
          nome: document.getElementById('nome').value,
          data_nascimento: document.getElementById('dataNascimento').value || null,
          nome_mae: document.getElementById('nomeMae').value || null,
          telefone: document.getElementById('telefone').value || null,
          telefone2: document.getElementById('telefone2').value || null,
          endereco: document.getElementById('endereco').value || null,
          foto_url: fotoUrl,
          status: status,
          data_conclusao: status === 'concluido' ? document.getElementById('dataConclusao').value : null,
          motivo_conclusao: status === 'concluido' ? document.getElementById('motivoConclusao').value : null,
          
          // Dados dos Responsáveis
          nome_pai: document.getElementById('nomePai').value || null,
          nome_avo: document.getElementById('nomeAvo').value || null,
          nome_outro_responsavel: document.getElementById('nomeOutroResponsavel').value || null,
          responsavel_principal: document.getElementById('responsavelPrincipal').value || null,
          email: document.getElementById('emailResp').value || null,
          
          // Perguntas da Entrevista
          pergunta_1: document.getElementById('pergunta1').value || null,
          pergunta_2: document.getElementById('pergunta2').value || null,
          pergunta_3: document.getElementById('pergunta3').value || null,
          pergunta_4: document.getElementById('pergunta4').value || null,
          pergunta_5: document.getElementById('pergunta5').value || null,
          pergunta_6: document.getElementById('pergunta6').value || null,
          pergunta_7: document.getElementById('pergunta7').value || null,
          pergunta_8: document.getElementById('pergunta8').value || null,
          pergunta_9: document.getElementById('pergunta9').value || null,
          pergunta_10: document.getElementById('pergunta10').value || null,
          pergunta_11: document.getElementById('pergunta11').value || null,
          pergunta_12: document.getElementById('pergunta12').value || null,
          pergunta_13: document.getElementById('pergunta13').value || null
        };

        const { error } = await supabase
          .from('pacientes')
          .update(updateData)
          .eq('id', pacienteId);

        if (error) throw error;

        alert('✅ Paciente atualizado com sucesso!');
        window.location.href = 'alunos.html';

      } catch (error) {
        console.error('Erro ao salvar:', error);
        alert('Erro ao salvar: ' + error.message);
        btnSubmit.disabled = false;
        btnSubmit.textContent = '💾 Salvar Alterações';
      }
    });

    // Iniciar
    carregarPaciente();
  </script>

    document.getElementById('sidebar-container').innerHTML = renderSidebar('alunos');
    document.getElementById('header-container').innerHTML = renderHeader('Editar Aluno', '✏️');
    loadUserName();
  </script>
</body>
