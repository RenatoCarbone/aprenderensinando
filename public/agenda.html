<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda - Aprender Ensinando</title>
  <link rel="stylesheet" href="/css/modern-layout.css">
  <style>
    /* Filtros Modernos */
    .filters-container {
      background: white;
      border-radius: var(--radius-xl);
      padding: var(--spacing-xl);
      margin-bottom: var(--spacing-lg);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-light);
    }

    .filters-grid {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: var(--spacing-md);
      align-items: end;
    }

    /* Cards de Resumo */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-lg);
    }

    .summary-card {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      padding: 1.5rem;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      text-align: center;
    }

    .summary-card.success {
      background: linear-gradient(135deg, #10B981 0%, #059669 100%);
    }

    .summary-card.warning {
      background: linear-gradient(135deg, #F59E0B 0%, #D97706 100%);
    }

    .summary-number {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .summary-label {
      font-size: 0.875rem;
      opacity: 0.9;
    }

    /* Modal Moderno */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      z-index: 1000;
      overflow-y: auto;
      padding: 2rem;
    }

    .modal-content {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl);
      animation: modalSlideIn 0.3s ease-out;
    }

    @keyframes modalSlideIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2rem;
      border-bottom: 2px solid var(--border-light);
    }

    .modal-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .modal-close {
      background: var(--bg-tertiary);
      border: none;
      width: 40px;
      height: 40px;
      border-radius: var(--radius-full);
      cursor: pointer;
      font-size: 1.25rem;
      transition: all var(--transition-fast);
      color: var(--text-secondary);
    }

    .modal-close:hover {
      background: var(--border);
      transform: rotate(90deg);
    }

    .modal-body {
      padding: 2rem;
    }

    .modal-footer {
      padding: 1.5rem 2rem;
      border-top: 2px solid var(--border-light);
      display: flex;
      gap: 1rem;
      justify-content: flex-end;
    }

    /* Botão Grande Novo Agendamento */
    .btn-new-appointment {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      padding: 1rem 2rem;
      font-size: 1.125rem;
      font-weight: 700;
      border-radius: var(--radius-xl);
      border: none;
      cursor: pointer;
      box-shadow: var(--shadow-md);
      transition: all var(--transition-base);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .btn-new-appointment:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-xl);
    }

    .btn-new-appointment .emoji {
      font-size: 1.5rem;
    }

    /* Lista de Agendamentos */
    .appointments-list {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-md);
    }

    .appointment-card {
      background: white;
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: var(--spacing-lg);
      transition: all var(--transition-fast);
      cursor: pointer;
    }

    .appointment-card:hover {
      border-color: var(--primary);
      box-shadow: var(--shadow-md);
      transform: translateX(4px);
    }

    .form-group {
      margin-bottom: var(--spacing-md);
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--spacing-sm);
    }

    .form-control {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 0.9375rem;
      transition: all var(--transition-fast);
    }

    .form-control:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 190, 205, 0.1);
    }

    .btn-large {
      padding: 0.875rem 1.75rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: var(--radius-lg);
      border: none;
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .btn-primary-large {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      box-shadow: var(--shadow-sm);
    }

    .btn-primary-large:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .btn-secondary-large {
      background: white;
      color: var(--text-primary);
      border: 1px solid var(--border);
    }

    .btn-secondary-large:hover {
      background: var(--bg-secondary);
    }

    /* Grade de Horários */
    .horarios-section {
      margin-top: var(--spacing-lg);
      padding-top: var(--spacing-lg);
      border-top: 2px solid var(--border-light);
    }

    .horarios-header {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--spacing-md);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .horarios-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
      max-height: 300px;
      overflow-y: auto;
      padding: 0.5rem;
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
    }

    .horario-slot {
      padding: 0.75rem;
      border-radius: var(--radius-md);
      text-align: center;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-fast);
      border: 2px solid transparent;
    }

    .horario-slot.livre {
      background: #D1FAE5;
      color: #065F46;
      border-color: #10B981;
    }

    .horario-slot.livre:hover {
      background: #10B981;
      color: white;
      transform: translateY(-2px);
      box-shadow: var(--shadow-sm);
    }

    .horario-slot.ocupado {
      background: #FEE2E2;
      color: #991B1B;
      border-color: #EF4444;
      cursor: not-allowed;
      opacity: 0.7;
    }

    .horario-slot.selecionado {
      background: var(--primary);
      color: white;
      border-color: var(--primary-dark);
      box-shadow: var(--shadow-md);
    }

    .horario-hora {
      font-size: 0.9375rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .horario-info {
      font-size: 0.6875rem;
      opacity: 0.9;
    }

    .legenda-horarios {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: var(--spacing-md);
      font-size: 0.8125rem;
    }

    .legenda-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .legenda-cor {
      width: 16px;
      height: 16px;
      border-radius: var(--radius-sm);
    }

    .legenda-cor.livre {
      background: #10B981;
    }

    .legenda-cor.ocupado {
      background: #EF4444;
    }

    @media (max-width: 768px) {
      .filters-grid {
        grid-template-columns: 1fr;
      }

      .summary-grid {
        grid-template-columns: 1fr;
      }

      .modal-overlay {
        padding: 1rem;
      }

      .horarios-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>

    <div id="sidebar-container"></div>

    <div class="main-content">
      <div id="header-container"></div>

      <div class="page-content">
        <!-- Botão Novo Agendamento -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-lg);">
          <a href="/dashboard.html" class="btn-large btn-secondary-large" style="display: inline-flex; text-decoration: none;">
            ← Voltar ao Dashboard
          </a>
          <button onclick="abrirModalNovoAgendamento()" class="btn-new-appointment">
            <span class="emoji">➕</span>

          </button>
        </div>

        <!-- Cards de Resumo -->
        <div class="summary-grid">
          <div class="summary-card">
            <div class="summary-number" id="totalHoje">0</div>
            <div class="summary-label">📅 Hoje</div>
          </div>
          <div class="summary-card success">
            <div class="summary-number" id="totalSemana">0</div>
            <div class="summary-label">📊 Esta Semana</div>
          </div>
          <div class="summary-card warning">
            <div class="summary-number" id="totalMes">0</div>
            <div class="summary-label">📈 Este Mês</div>
          </div>
        </div>

        <!-- Filtros -->
        <div class="filters-container">
          <div class="filters-grid">
            <div class="form-group" style="margin-bottom: 0;">
              <label for="filtroData" class="form-label">📅 Data</label>
              <input type="date" id="filtroData" class="form-control">

            <div class="form-group" style="margin-bottom: 0;">

        <!-- Lista de Agendamentos -->
        <div class="card">

          <div id="listaAgendamentos" style="padding: var(--spacing-lg);">
            <div style="text-align: center; padding: 2rem; color: var(--text-tertiary);">
              ⏳ Carregando...
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Novo Agendamento -->
  <div id="modalAgendamento" class="modal-overlay">
    <div class="modal-content" style="max-width: 800px;">
      <div class="modal-header">
        <h2 id="modalTitulo" class="modal-title">
          <span>📅</span>
          <span>Novo Agendamento</span>
        </h2>
        <button onclick="fecharModal()" class="modal-close">✕</button>
      </div>
      
      <form id="agendamentoForm">
        <div class="modal-body">
        <div class="form-group">
          <label for="tipoAgendamento" class="form-label">📋 Tipo de Agendamento</label>
          <select id="tipoAgendamento" class="form-control">
            <option value="aula" selected>📚 Aula</option>
            <option value="avaliacao">💬 Avaliação Inicial com os Pais</option>
            <option value="reuniao">👥 Reunião (laudo, acompanhamento, etc.)</option>
          </select>
        </div>

        <div class="form-group" id="grupoPaciente">

          <select id="pacienteSelect" class="form-control">
            <option value="">Selecione um aluno...</option>
          </select>
        </div>

        <!-- Múltiplas Datas e Horários -->
        <div class="form-group">
          <label class="form-label">📅 Data(s) e Horário(s)</label>
          <div id="datasHorariosContainer">
            <!-- Primeira data/horário -->
            <div class="data-horario-item" style="display: grid; grid-template-columns: 1fr 1fr auto; gap: 0.5rem; margin-bottom: 0.5rem; align-items: end;">
              <div>
                <input type="date" class="form-control input-data" required onchange="verificarHorariosOcupados(this)">
              </div>
              <div>
                <select class="form-control select-horario" required disabled>
                  <option value="">Selecione a data primeiro</option>
                </select>
              </div>
              <div style="width: 40px;"></div>
            </div>
          </div>
          <button type="button" onclick="adicionarDataHorario()" class="btn btn-secondary" style="margin-top: 0.5rem;">
            ➕ Adicionar mais data
          </button>
        </div>

        <div class="form-group">
          <label for="duracaoAgendamento" class="form-label">Duração (minutos)</label>
          <select id="duracaoAgendamento" class="form-control">
            <option value="30">30 minutos</option>

            <option value="60" selected>1 hora</option>

        <div class="form-group">

          <textarea id="observacoesAgendamento" class="form-control" rows="3" placeholder="Ex: Entrevista inicial com a mãe, trazer histórico escolar, etc."></textarea>

        <div class="modal-footer">

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const sb = window.supabase.createClient('https://ukjxekdwumfxilphrrmb.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVranhla2R3dW1meGlscGhycm1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NjM1ODQsImV4cCI6MjA4ODAzOTU4NH0.c68Cp_HYU53aeSoZyNUM6RiHSDFq0Y0sPxJEAyq1nQk');
    async function checkAuth(){const{data:{session}}=await sb.auth.getSession();if(!session){window.location.href='/index.html';return null}return session}
    async function logout(){await sb.auth.signOut();window.location.href='/index.html'}
    function formatDate(d){if(!d)return '';return new Date(d).toLocaleDateString('pt-BR')}
    function showAlert(m,t){alert(m)}
    function showLoading(s){}
  </script>
  <script>
    let currentUser = null;
    let agendamentoEditando = null;

    // Carregar usuário
    (async () => {
      const session = await checkAuth();
      if (!session) return;

      const {data} = await sb.from("usuarios").select("*").eq("id", session.user.id).single(); currentUser = data;
      if (currentUser) {
        document.getElementById('userName').textContent = currentUser.nome || currentUser.email;
      }

      // Verificar se veio de link com paciente pré-selecionado
      const urlParams = new URLSearchParams(window.location.search);
      const pacienteId = urlParams.get('paciente');

      // NÃO definir filtro de data padrão - mostrar todos os agendamentos
      // Se quiser filtrar, o usuário escolhe a data

      await carregarPacientes();
      await carregarAgendamentos();

      if (pacienteId) {
        abrirModalNovoAgendamento(pacienteId);
      }
    })();

    async function carregarPacientes() {
      try {
        const { data, error } = await sb
          .from('pacientes')
          .select('id, nome, id_aluno')
          .order('nome');

        if (error) throw error;

        const select = document.getElementById('pacienteSelect');
        select.innerHTML = '<option value="">Selecione um paciente...</option>' +
          data.map(p => `<option value="${p.id}">${p.nome} (${p.id_aluno})</option>`).join('');

      } catch (error) {
        console.error('Erro ao carregar pacientes:', error);
      }
    }

    async function carregarAgendamentos() {
      try {
        showLoading(true);

        const dataFiltro = document.getElementById('filtroData').value;
        const pacienteFiltro = document.getElementById('filtroPaciente').value.toLowerCase();

        let query = sb
          .from('agendamentos')
          .select(`
            *,
            pacientes (nome, id_aluno, telefone)
          `)
          .order('data_hora', { ascending: true });

        if (dataFiltro) {
          const inicioDia = dataFiltro + 'T00:00:00';
          const fimDia = dataFiltro + 'T23:59:59';
          query = query.gte('data_hora', inicioDia).lte('data_hora', fimDia);
        }

        const { data: agendamentos, error } = await query;

        if (error) throw error;

        // Filtrar por nome do paciente se necessário
        let filtrados = agendamentos || [];
        if (pacienteFiltro) {
          filtrados = filtrados.filter(a => 
            a.pacientes?.nome.toLowerCase().includes(pacienteFiltro)
          );
        }

        renderizarAgendamentos(filtrados);
        await atualizarResumo();

        showLoading(false);

      } catch (error) {
        showLoading(false);
        console.error('Erro ao carregar agendamentos:', error);
        showAlert('Erro ao carregar agendamentos', 'danger');
      }
    }

    function renderizarAgendamentos(agendamentos) {
      const container = document.getElementById('listaAgendamentos');

      if (agendamentos.length === 0) {
        container.innerHTML = '<p class="text-secondary text-center">Nenhum agendamento encontrado</p>';
        return;
      }

      container.innerHTML = agendamentos.map(a => {
        const dataHora = new Date(a.data_hora);
        const isPast = dataHora < new Date();
        
        return `
          <div style="padding: 1rem; border-bottom: 1px solid var(--border-color); ${isPast ? 'opacity: 0.6;' : ''}">
            <div style="display: flex; justify-content: space-between; align-items: start;">
              <div style="flex: 1;">
                <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem;">
                  <strong style="font-size: 1.1rem;">${dataHora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', timeZone: 'America/Sao_Paulo' })}</strong>
                  ${a.duracao ? `<span class="badge badge-secondary">${a.duracao} min</span>` : ''}
                  ${isPast ? '<span class="badge badge-info">Realizado</span>' : '<span class="badge badge-success">Agendado</span>'}
                </div>
                <div>
                  <strong>${a.pacientes?.nome || '💬 Avaliação Inicial'}</strong>
                  ${a.pacientes ? `
                    <small style="display: block; color: var(--text-secondary);">
                      ${a.pacientes.id_aluno || ''} ${a.pacientes.telefone ? '• ' + a.pacientes.telefone : ''}
                    </small>
                  ` : ''}
                </div>
                ${a.observacoes ? `<p style="margin-top: 0.5rem; font-size: 0.875rem; color: var(--text-secondary);">${a.observacoes}</p>` : ''}
              </div>
              <div style="display: flex; gap: 0.5rem;">
                ${!isPast ? `
                  <button onclick="editarAgendamento('${a.id}')" class="btn btn-secondary" style="padding: 0.25rem 0.75rem; font-size: 0.875rem;">
                    ✏️
                  </button>
                  <button onclick="excluirAgendamento('${a.id}')" class="btn btn-danger" style="padding: 0.25rem 0.75rem; font-size: 0.875rem;">
                    🗑️
                  </button>
                ` : `
                  <a href="/sessao.html?paciente=${a.paciente_id}&agendamento=${a.id}" class="btn btn-primary" style="padding: 0.25rem 0.75rem; font-size: 0.875rem;">
                    📝 Registrar
                  </a>
                `}
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    // Carregar horários disponíveis
    async function carregarHorariosDisponiveis() {
      const dataInput = document.getElementById('dataAgendamento');
      const data = dataInput.value;

      if (!data) return;

      try {
        // Buscar agendamentos do dia selecionado
        const { data: agendamentos, error } = await sb
          .from('agendamentos')
          .select('data_hora, duracao, pacientes(nome)')
          .gte('data_hora', `${data}T00:00:00`)
          .lte('data_hora', `${data}T23:59:59`)
          .eq('usuario_id', currentUser.id);

        if (error) throw error;

        // Gerar horários (08:00 às 20:00, intervalos de 30min)
        const horarios = [];
        for (let h = 8; h <= 19; h++) {
          for (let m = 0; m < 60; m += 30) {
            const hora = String(h).padStart(2, '0');
            const min = String(m).padStart(2, '0');
            horarios.push(`${hora}:${min}`);
          }
        }

        // Verificar quais horários estão ocupados
        const horariosOcupados = new Set();
        agendamentos.forEach(ag => {
          const inicio = new Date(ag.data_hora);
          const duracao = ag.duracao || 60;
          const fim = new Date(inicio.getTime() + duracao * 60000);

          // Marcar todos os horários ocupados durante essa aula
          horarios.forEach(h => {
            const [hora, min] = h.split(':');
            const horarioCheck = new Date(inicio);
            horarioCheck.setHours(parseInt(hora), parseInt(min), 0);

            if (horarioCheck >= inicio && horarioCheck < fim) {
              horariosOcupados.add(`${h}|${ag.pacientes?.nome || 'Avaliação Inicial'}`);
            }
          });
        });

        // Renderizar grade
        const grid = document.getElementById('horariosGrid');
        grid.innerHTML = horarios.map(h => {
          const ocupado = Array.from(horariosOcupados).find(o => o.startsWith(h));
          const [horario, nome] = ocupado ? ocupado.split('|') : [h, null];
          
          if (ocupado) {
            return `
              <div class="horario-slot ocupado" title="Ocupado: ${nome}">
                <div class="horario-hora">${h}</div>
                <div class="horario-info">${nome}</div>
              </div>
            `;
          } else {
            return `
              <div class="horario-slot livre" onclick="selecionarHorario('${h}')">
                <div class="horario-hora">${h}</div>
                <div class="horario-info">Livre</div>
              </div>
            `;
          }
        }).join('');

        // Mostrar seção
        document.getElementById('horariosSection').style.display = 'block';

      } catch (error) {
        console.error('Erro ao carregar horários:', error);
        alert('❌ Erro ao carregar horários disponíveis');
      }
    }

    // Selecionar horário
    window.selecionarHorario = function(horario) {
      // Remover seleção anterior
      document.querySelectorAll('.horario-slot').forEach(slot => {
        slot.classList.remove('selecionado');
      });

      // Adicionar seleção no horário clicado
      event.target.closest('.horario-slot').classList.add('selecionado');

      // Salvar horário selecionado
      document.getElementById('horarioSelecionado').value = horario;
    };

    // Tornar função global
    window.carregarHorariosDisponiveis = carregarHorariosDisponiveis;

    async function atualizarResumo() {
      try {
        // Hoje
        const hoje = new Date().toISOString().split('T')[0];
        const { count: totalHoje } = await sb
          .from('agendamentos')
          .select('*', { count: 'exact', head: true })
          .gte('data_hora', hoje + 'T00:00:00')
          .lte('data_hora', hoje + 'T23:59:59');

        document.getElementById('totalHoje').textContent = totalHoje || 0;

        // Semana
        const inicioSemana = new Date();
        inicioSemana.setDate(inicioSemana.getDate() - inicioSemana.getDay());
        const { count: totalSemana } = await sb
          .from('agendamentos')
          .select('*', { count: 'exact', head: true })
          .gte('data_hora', inicioSemana.toISOString());

        document.getElementById('totalSemana').textContent = totalSemana || 0;

        // Mês
        const inicioMes = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
        const { count: totalMes } = await sb
          .from('agendamentos')
          .select('*', { count: 'exact', head: true })
          .gte('data_hora', inicioMes.toISOString());

        document.getElementById('totalMes').textContent = totalMes || 0;

      } catch (error) {
        console.error('Erro ao atualizar resumo:', error);
      }
    }


    function abrirModalNovoAgendamento(pacienteId = null) {
      agendamentoEditando = null;
      document.getElementById('modalTitulo').querySelector('span:last-child').textContent = 'Novo Agendamento';
      document.getElementById('agendamentoForm').reset();
      
      // Resetar container de datas/horários para ter apenas 1 linha
      const container = document.getElementById('datasHorariosContainer');
      container.innerHTML = `
        <div class="data-horario-item" style="display: grid; grid-template-columns: 1fr 1fr auto; gap: 0.5rem; margin-bottom: 0.5rem; align-items: end;">
          <div>
            <input type="date" class="form-control input-data" required onchange="verificarHorariosOcupados(this)">
          </div>
          <div>
            <select class="form-control select-horario" required disabled>
              <option value="">Selecione a data primeiro</option>
            </select>
          </div>
          <div style="width: 40px;"></div>
        </div>
      `;

      if (pacienteId) {
        document.getElementById('pacienteSelect').value = pacienteId;
      }

      document.getElementById('modalAgendamento').style.display = 'block';
    }

    async function editarAgendamento(id) {
      try {
        const { data, error } = await sb
          .from('agendamentos')
          .select('*')
          .eq('id', id)
          .single();

        if (error) throw error;

        agendamentoEditando = data;
        document.getElementById('modalTitulo').textContent = 'Editar Agendamento';
        
        const dataHora = new Date(data.data_hora);
        document.getElementById('pacienteSelect').value = data.paciente_id;
        
        // Preencher a primeira linha de data/hora
        const container = document.getElementById('datasContainer');
        container.querySelector('.data-input').value = dataHora.toISOString().split('T')[0];
        container.querySelector('.hora-input').value = dataHora.toTimeString().substring(0, 5);
        
        document.getElementById('duracaoAgendamento').value = data.duracao || 60;
        document.getElementById('observacoesAgendamento').value = data.observacoes || '';

        document.getElementById('modalAgendamento').style.display = 'block';

      } catch (error) {
        console.error('Erro ao carregar agendamento:', error);
        showAlert('Erro ao carregar agendamento', 'danger');
      }
    }

    async function excluirAgendamento(id) {
      if (!confirm('Deseja realmente excluir este agendamento?')) return;

      try {
        showLoading(true);

        const { error } = await sb
          .from('agendamentos')
          .delete()
          .eq('id', id);

        if (error) throw error;

        showAlert('Agendamento excluído com sucesso!', 'success');
        await carregarAgendamentos();

      } catch (error) {
        console.error('Erro ao excluir agendamento:', error);
        showAlert('Erro ao excluir agendamento', 'danger');
      } finally {
        showLoading(false);
      }
    }

    function fecharModal() {
      document.getElementById('modalAgendamento').style.display = 'none';
      agendamentoEditando = null;
    }

    // Gerar horários de meia em meia hora (07:00 até 20:00)
    function gerarOpcoesHorario() {
      const opcoes = [];
      for (let h = 7; h <= 20; h++) {
        for (let m = 0; m < 60; m += 30) {
          const hora = h.toString().padStart(2, '0');
          const min = m.toString().padStart(2, '0');
          opcoes.push(`${hora}:${min}`);
        }
      }
      return opcoes;
    }

    // Adicionar novo campo de data/horário
    function adicionarDataHorario() {
      const container = document.getElementById('datasHorariosContainer');
      const index = container.children.length;
      
      const novoItem = document.createElement('div');
      novoItem.className = 'data-horario-item';
      novoItem.style.cssText = 'display: grid; grid-template-columns: 1fr 1fr auto; gap: 0.5rem; margin-bottom: 0.5rem; align-items: end;';
      novoItem.innerHTML = `
        <div>
          <input type="date" class="form-control input-data" required onchange="verificarHorariosOcupados(this)">
        </div>
        <div>
          <select class="form-control select-horario" required disabled>
            <option value="">Selecione a data primeiro</option>
          </select>
        </div>
        <div>
          <button type="button" onclick="removerDataHorario(this)" class="btn" style="background: #EF4444; color: white; padding: 0.5rem;">
            🗑️
          </button>
        </div>
      `;
      
      container.appendChild(novoItem);
    }

    // Remover campo de data/horário
    function removerDataHorario(btn) {
      btn.closest('.data-horario-item').remove();
    }

    // Verificar horários ocupados quando seleciona uma data
    async function verificarHorariosOcupados(inputData) {
      const data = inputData.value;
      if (!data) return;
      
      const selectHorario = inputData.closest('.data-horario-item').querySelector('.select-horario');
      selectHorario.disabled = true;
      selectHorario.innerHTML = '<option value="">Carregando...</option>';
      
      try {
        // Buscar agendamentos do dia
        const { data: agendamentos, error } = await sb
          .from('agendamentos')
          .select('data_hora, duracao')
          .gte('data_hora', data + 'T00:00:00')
          .lt('data_hora', data + 'T23:59:59');
        
        if (error) throw error;
        
        // Pegar duração selecionada
        const duracaoSelecionada = parseInt(document.getElementById('duracaoAgendamento').value);
        
        // Criar array com todos os horários ocupados (incluindo duração)
        const horariosOcupados = new Set();
        agendamentos.forEach(ag => {
          const inicio = ag.data_hora.substring(11, 16);
          const duracao = ag.duracao || 60;
          
          console.log('Agendamento:', inicio, 'Duração:', duracao, 'minutos');
          
          // Adicionar todos os intervalos de 30min ocupados a partir do início
          const [h, m] = inicio.split(':').map(Number);
          let minutos = h * 60 + m;
          const fim = minutos + duracao;
          
          console.log('Minutos início:', minutos, 'Minutos fim:', fim);
          
          // Loop começa no início e vai até o fim
          for (let temp = minutos; temp < fim; temp += 30) {
            const hh = Math.floor(temp / 60).toString().padStart(2, '0');
            const mm = (temp % 60).toString().padStart(2, '0');
            console.log('Marcando como ocupado:', `${hh}:${mm}`);
            horariosOcupados.add(`${hh}:${mm}`);
          }
        });
        
        console.log('Horários ocupados final:', Array.from(horariosOcupados));
        
        // Gerar opções
        const horarios = gerarOpcoesHorario();
        let html = '<option value="">Selecione o horário</option>';
        
        horarios.forEach(horario => {
          // Verificar se este horário + duração tem conflito
          const [h, m] = horario.split(':').map(Number);
          let minutos = h * 60 + m;
          const fim = minutos + duracaoSelecionada;
          
          let temConflito = false;
          let temp = minutos;
          while (temp < fim) {
            const hh = Math.floor(temp / 60).toString().padStart(2, '0');
            const mm = (temp % 60).toString().padStart(2, '0');
            if (horariosOcupados.has(`${hh}:${mm}`)) {
              temConflito = true;
              break;
            }
            temp += 30;
          }
          
          const cor = temConflito ? 'color: #EF4444; font-weight: 600;' : '';
          const texto = temConflito ? `${horario} ⛔ Ocupado` : horario;
          html += `<option value="${horario}" style="${cor}" ${temConflito ? 'disabled' : ''}>${texto}</option>`;
        });
        
        selectHorario.innerHTML = html;
        selectHorario.disabled = false;
        
      } catch (error) {
        console.error('Erro:', error);
        selectHorario.innerHTML = '<option value="">Erro ao carregar</option>';
      }
    }

    // Submeter formulário
    document.getElementById('agendamentoForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const pacienteId = document.getElementById('pacienteSelect').value;
      const duracao = parseInt(document.getElementById('duracaoAgendamento').value);
      const observacoes = document.getElementById('observacoesAgendamento').value.trim();
      const tipoAgendamento = document.getElementById('tipoAgendamento').value;

      // Validar paciente (obrigatório para Aula e Reunião)
      if (!pacienteId && tipoAgendamento !== 'avaliacao') {
        alert('Selecione um paciente');
        return;
      }

      // Para avaliação, validar observações (deve ter nome dos pais)
      if (tipoAgendamento === 'avaliacao' && !observacoes) {
        alert('Para Avaliação Inicial, preencha as observações com o nome dos pais/responsáveis e da criança');
        return;
      }

      // Coletar todas as datas e horários
      const datasHorarios = [];
      document.querySelectorAll('.data-horario-item').forEach(item => {
        const data = item.querySelector('.input-data').value;
        const horario = item.querySelector('.select-horario').value;
        
        if (data && horario) {
          datasHorarios.push({ data, horario });
        }
      });

      if (datasHorarios.length === 0) {
        alert('Preencha pelo menos uma data e horário');
        return;
      }

      if (!confirm(`Serão criados ${datasHorarios.length} agendamento(s). Deseja continuar?`)) {
        return;
      }

      try {
        showLoading(true);

        // Criar múltiplos agendamentos
        const agendamentos = datasHorarios.map(dh => ({
          data_hora: `${dh.data}T${dh.horario}:00`,
          paciente_id: pacienteId || null,
          duracao: duracao,
          observacoes: observacoes,
          tipo: tipoAgendamento,
          usuario_id: currentUser.id
        }));

        if (agendamentoEditando) {
          // Atualizar (apenas primeiro agendamento se estiver editando)
          const { error } = await sb
            .from('agendamentos')
            .update({
              paciente_id: pacienteId || null,
              data_hora: agendamentos[0].data_hora,
              duracao: duracao,
              observacoes: observacoes,
              tipo: tipoAgendamento
            })
            .eq('id', agendamentoEditando.id);

          if (error) throw error;

          alert('✅ Agendamento atualizado com sucesso!');

        } else {
          // Criar múltiplos agendamentos
          const { error } = await sb
            .from('agendamentos')
            .insert(agendamentos);

          if (error) throw error;

          // Marcar primeira aula como agendada
          if (pacienteId) {
            await sb
              .from('pacientes')
              .update({ primeira_aula_agendada: true })
              .eq('id', pacienteId);
          }

          alert(`✅ ${agendamentos.length} agendamento(s) criado(s) com sucesso!`);
        }

        fecharModal();
        await carregarAgendamentos();

      } catch (error) {
        console.error('Erro ao salvar agendamento:', error);
        alert('Erro ao salvar agendamento: ' + error.message);
      } finally {
        showLoading(false);
      }
    });

    // Recarregar horários quando mudar a duração
    document.getElementById('duracaoAgendamento').addEventListener('change', () => {
      // Recarregar todos os selects de horário que já têm data selecionada
      document.querySelectorAll('.input-data').forEach(input => {
        if (input.value) {
          verificarHorariosOcupados(input);
        }
      });
    });

    // Mostrar/esconder campo paciente conforme tipo de agendamento
    document.getElementById('tipoAgendamento').addEventListener('change', (e) => {
      const grupoPaciente = document.getElementById('grupoPaciente');
      
      if (e.target.value === 'avaliacao') {
        // Esconder campo de paciente para avaliação inicial
        grupoPaciente.style.display = 'none';
        document.getElementById('pacienteSelect').value = ''; // Limpar seleção
      } else {
        // Mostrar campo para Aula e Reunião
        grupoPaciente.style.display = 'block';
      }
    });

    // Fechar modal ao clicar fora
    document.getElementById('modalAgendamento').addEventListener('click', (e) => {
      if (e.target.id === 'modalAgendamento') {
        fecharModal();
      }
    });
  </script>

  <script type='module'>
    import { renderSidebar, renderHeader, loadUserName } from './js/sidebar.js';
    document.getElementById('sidebar-container').innerHTML = renderSidebar('agenda');
    document.getElementById('header-container').innerHTML = renderHeader('Agenda de Aulas', '📅');
    loadUserName();
