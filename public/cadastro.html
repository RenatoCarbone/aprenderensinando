<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Aprender Ensinando</title>
  <link rel="stylesheet" href="/css/modern-layout.css">
  <style>
    .form-section {
      background: white;
      border-radius: var(--radius-xl);
      padding: var(--spacing-lg);
      margin-bottom: var(--spacing-md);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-light);
    }

    .form-section-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--spacing-lg);
      padding-bottom: var(--spacing-md);
      border-bottom: 2px solid var(--border-light);
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--spacing-md);
    }

    .form-grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--spacing-md);
    }

    .form-full {
      grid-column: 1 / -1;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-sm);
    }

    .form-label {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .form-label.required::after {
      content: " *";
      color: #EF4444;
    }

    .form-control {
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 0.9375rem;
      transition: all var(--transition-fast);
      background: white;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 190, 205, 0.1);
    }

    textarea.form-control {
      resize: vertical;
      min-height: 80px;
    }

    .form-text {
      font-size: 0.75rem;
      color: var(--text-tertiary);
      margin-top: 0.25rem;
    }

    .alert {
      padding: 1rem 1.25rem;
      border-radius: var(--radius-md);
      margin-bottom: var(--spacing-lg);
      border-left: 4px solid;
    }

    .alert-info {
      background: #EFF6FF;
      border-color: #3B82F6;
      color: #1E40AF;
    }

    .btn-group {
      display: flex;
      gap: var(--spacing-md);
      margin-top: var(--spacing-xl);
    }

    /* Botões Grandes e Modernos */
    .btn-action-group {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 2rem;
      margin-bottom: 3rem;
      padding-top: 1.5rem;
    }

    .btn-large {
      padding: 1.25rem 2rem;
      font-size: 1.125rem;
      font-weight: 700;
      border-radius: var(--radius-xl);
      border: none;
      cursor: pointer;
      transition: all var(--transition-base);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      box-shadow: var(--shadow-md);
      text-decoration: none;
    }

    .btn-large:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-xl);
    }

    .btn-save {
      background: linear-gradient(135deg, #10B981 0%, #059669 100%);
      color: white;
    }

    .btn-save:hover {
      background: linear-gradient(135deg, #059669 0%, #047857 100%);
    }

    .btn-cancel {
      background: linear-gradient(135deg, #6B7280 0%, #4B5563 100%);
      color: white;
    }

    .btn-cancel:hover {
      background: linear-gradient(135deg, #4B5563 0%, #374151 100%);
    }

    .btn-large .emoji {
      font-size: 1.5rem;
    }

    @media (max-width: 768px) {
      .form-grid,
      .form-grid-3 {
        grid-template-columns: 1fr;
      }

      .btn-action-group {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-container"></div>

    <div class="main-content">
      <div id="header-container"></div>

      <div class="page-content">
        <div class="alert alert-info">
          📋 Preencha os dados cadastrais e as perguntas da entrevista inicial em um único formulário.
        </div>

        <form id="cadastroForm">
          <!-- DADOS CADASTRAIS -->
          <div class="form-section">
            <h2 class="form-section-title">
              <span>👶</span>
              <span>Dados da Criança</span>
            </h2>
            
            <div class="form-group form-full">
              <label for="nome" class="form-label required">Nome Completo</label>
              <input type="text" id="nome" class="form-control" required>
            </div>

            <div class="form-grid-3">
              <div class="form-group">
                <label for="dataNascimento" class="form-label required">Data de Nascimento</label>
                <input type="date" id="dataNascimento" class="form-control" required>
                <small class="form-text" id="idadeCalculada"></small>
              </div>

              <div class="form-group">
                <label for="sexo" class="form-label required">Sexo</label>
                <select id="sexo" class="form-control" required>
                  <option value="">Selecione...</option>
                  <option value="M">Masculino</option>
                  <option value="F">Feminino</option>
                </select>
              </div>

              <div class="form-group">
                <label for="serieAno" class="form-label">Série/Ano</label>
                <input type="text" id="serieAno" class="form-control" placeholder="Ex: 3º ano">
              </div>
            </div>

            <div class="form-grid">
              <div class="form-group">
                <label for="nivelEscolar" class="form-label">Nível Escolar</label>
                <select id="nivelEscolar" class="form-control">
                  <option value="">Selecione...</option>
                  <option value="Educação Infantil">Educação Infantil</option>
                  <option value="Fundamental 1">Fundamental 1 (1º ao 5º ano)</option>
                  <option value="Fundamental 2">Fundamental 2 (6º ao 9º ano)</option>
                  <option value="Ensino Médio">Ensino Médio</option>
                </select>
              </div>

              <div class="form-group">
                <label for="escola" class="form-label">Escola</label>
                <input type="text" id="escola" class="form-control">
              </div>
            </div>

            <div class="form-group form-full">
              <label for="indicacao" class="form-label">Como conheceu? (Indicação)</label>
              <input type="text" id="indicacao" class="form-control" placeholder="Ex: Indicação da Maria Silva">
            </div>
        </div>
      </div>

          <!-- DADOS DOS RESPONSÁVEIS -->
          <div class="form-section">
            <h2 class="form-section-title">
              <span>👨‍👩‍👧</span>
              <span>Dados dos Responsáveis</span>
            </h2>
            
            <div class="form-grid">
              <div class="form-group">
                <label for="nomeMae" class="form-label">Nome da Mãe</label>
                <input type="text" id="nomeMae" class="form-control">
              </div>

              <div class="form-group">
                <label for="nomePai" class="form-label">Nome do Pai</label>
                <input type="text" id="nomePai" class="form-control">
              </div>

              <div class="form-group">
                <label for="nomeAvo" class="form-label">Avô/Avó</label>
                <input type="text" id="nomeAvo" class="form-control">
              </div>

              <div class="form-group">
                <label for="nomeOutroResponsavel" class="form-label">Outro Responsável</label>
                <input type="text" id="nomeOutroResponsavel" class="form-control">
              </div>

              <div class="form-group">
                <label for="responsavelPrincipal" class="form-label required">Responsável Principal</label>
                <select id="responsavelPrincipal" class="form-control" required>
                  <option value="">Selecione...</option>
                  <option value="Mãe">Mãe</option>
                  <option value="Pai">Pai</option>
                  <option value="Avô/Avó">Avô/Avó</option>
                  <option value="Outro">Outro</option>
                </select>
              </div>

              <div class="form-group">
                <label for="email" class="form-label">E-mail</label>
                <input type="email" id="email" class="form-control">
              </div>

              <div class="form-group">
                <label for="telefone" class="form-label">Telefone Principal</label>
                <input type="tel" id="telefone" class="form-control" placeholder="(00) 00000-0000">
              </div>

              <div class="form-group">
                <label for="telefone2" class="form-label">Telefone Secundário</label>
                <input type="tel" id="telefone2" class="form-control" placeholder="(00) 00000-0000">
              </div>
            </div>

            <div class="form-group form-full">
              <label for="endereco" class="form-label">Endereço Completo</label>
              <input type="text" id="endereco" class="form-control">
            </div>
          </div>

          <!-- ENTREVISTA INICIAL -->
          <div class="form-section">
            <h2 class="form-section-title">
              <span>💬</span>
              <span>Entrevista Inicial</span>
            </h2>
          <div class="form-group">
            <label for="pergunta1" class="form-label required">
              1) QUEIXA LIVRE: Em que posso ajudá-los? Ou o que os trouxe até aqui?
            </label>
            <textarea id="pergunta1" class="form-control" rows="3" required></textarea>
          </div>

          <div class="form-group">
            <label for="pergunta2" class="form-label required">
              2) Quando começou o problema?
            </label>
            <textarea id="pergunta2" class="form-control" rows="2" required></textarea>
          </div>

          <div class="form-group">
            <label for="pergunta3" class="form-label required">
              3) Como vocês se sentem diante dessa dificuldade?
            </label>
            <textarea id="pergunta3" class="form-control" rows="2" required></textarea>
          </div>

          <div class="form-group">
            <label for="pergunta4" class="form-label">
              4) O que a escola relata sobre essa dificuldade?
            </label>
            <textarea id="pergunta4" class="form-control" rows="2"></textarea>
          </div>

          <div class="form-group">
            <label for="pergunta5" class="form-label">
              5) Em casa, como é essa dificuldade relatada pela escola?
            </label>
            <textarea id="pergunta5" class="form-control" rows="2"></textarea>
          </div>

          <div class="form-group">
            <label for="pergunta6" class="form-label">
              6) Fale-me em detalhes como é a rotina de seu filho desde a hora e acordar até a hora de dormir, durante uma semana.
            </label>
            <textarea id="pergunta6" class="form-control" rows="3"></textarea>
          </div>

          <div class="form-group">
            <label for="pergunta7" class="form-label">
              7) Como ele se comporta ao fazer as lições de casa?
            </label>
            <textarea id="pergunta7" class="form-control" rows="2"></textarea>
          </div>

          <div class="form-group">
            <label for="pergunta8" class="form-label">
              8) E como vocês reagem a esse comportamento?
            </label>
            <textarea id="pergunta8" class="form-control" rows="2"></textarea>
          </div>

          <div class="form-group">
            <label for="pergunta9" class="form-label">
              9) Existe outro problema além desse?
            </label>
            <textarea id="pergunta9" class="form-control" rows="2"></textarea>
          </div>

          <div class="form-group">
            <label for="pergunta10" class="form-label">
              10) Quais as qualidades de seu filho?
            </label>
            <textarea id="pergunta10" class="form-control" rows="2"></textarea>
          </div>

          <div class="form-group">
            <label for="pergunta11" class="form-label">
              11) Tem outros filhos? Como eles são?
            </label>
            <textarea id="pergunta11" class="form-control" rows="2"></textarea>
          </div>

          <div class="form-group">
            <label for="pergunta12" class="form-label">
              12) O que vocês esperam de mim e do meu trabalho?
            </label>
            <textarea id="pergunta12" class="form-control" rows="2"></textarea>
          </div>

          <div class="form-group">
            <label for="pergunta13" class="form-label">
              13) Gostariam de acrescentar algo?
            </label>
            <textarea id="pergunta13" class="form-control" rows="2"></textarea>
          </div>

          <div class="form-group">
            <label for="observacoesGerais" class="form-label">Observações Gerais</label>
            <textarea id="observacoesGerais" class="form-control" rows="3" 
              placeholder="Outras informações importantes sobre o paciente..."></textarea>
          </div>

          <div class="form-group">
            <label class="form-label" style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
              <input type="checkbox" id="autorizacaoImagem" style="width: auto; height: auto;">
              <span>Autorizo o uso da imagem do meu filho(a) nas redes sociais e materiais de divulgação da instituição</span>
            </label>
          </div>
        </div>
      </div>

          <!-- BOTÕES -->
          <div class="btn-action-group">
            <a href="/dashboard.html" class="btn-large btn-cancel">
              <span class="emoji">❌</span>
              <span>Cancelar</span>
            </a>
            <button type="submit" class="btn-large btn-save">
              <span class="emoji">💾</span>
              <span>Salvar Cadastro</span>
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const sb = window.supabase.createClient(
      'https://ukjxekdwumfxilphrrmb.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVranhla2R3dW1meGlscGhycm1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NjM1ODQsImV4cCI6MjA4ODAzOTU4NH0.c68Cp_HYU53aeSoZyNUM6RiHSDFq0Y0sPxJEAyq1nQk'
    );
    
    async function checkAuth() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) {
        window.location.href = '/index.html';
        return null;
      }
      return session;
    }
    
    async function logout() {
      await sb.auth.signOut();
      window.location.href = '/index.html';
    }
    
    function calcularIdade(dataNascimento) {
      if (!dataNascimento) return null;
      const hoje = new Date();
      const nascimento = new Date(dataNascimento);
      let idade = hoje.getFullYear() - nascimento.getFullYear();
      const mes = hoje.getMonth() - nascimento.getMonth();
      if (mes < 0 || (mes === 0 && hoje.getDate() < nascimento.getDate())) {
        idade--;
      }
      return idade;
    }
    
    function showAlert(msg, type) {
      alert(msg);
    }
    
    function showLoading(show) {
      // Implementação simples
    }
  </script>
  <script>
    let currentUser = null;

    // Carregar usuário
    (async () => {
      const session = await checkAuth();
      if (!session) return;

      const { data } = await sb.from('usuarios').select('*').eq('id', session.user.id).single();
      currentUser = data;
      if (currentUser) {
        document.getElementById('userName').textContent = currentUser.nome || currentUser.email;
      }
    })();

    // Calcular idade automaticamente
    document.getElementById('dataNascimento').addEventListener('change', (e) => {
      const idade = calcularIdade(e.target.value);
      if (idade !== null) {
        document.getElementById('idadeCalculada').textContent = `${idade} anos`;
      }
    });

    // Submeter formulário
    document.getElementById('cadastroForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      if (!confirm('Deseja salvar o cadastro deste paciente?')) {
        return;
      }

      showLoading(true);

      try {
        // Gerar ID do aluno (ALU-XX)
        const { count } = await sb
          .from('pacientes')
          .select('*', { count: 'exact', head: true });
        
        const idAluno = `ALU-${String((count || 0) + 1).padStart(3, '0')}`;

        // Preparar dados do paciente
        const pacienteData = {
          id_aluno: idAluno,
          nome: document.getElementById('nome').value.trim(),
          data_nascimento: document.getElementById('dataNascimento').value,
          sexo: document.getElementById('sexo').value,
          nivel_escolar: document.getElementById('nivelEscolar').value,
          serie_ano: document.getElementById('serieAno').value.trim(),
          escola: document.getElementById('escola').value.trim(),
          indicacao: document.getElementById('indicacao').value.trim(),
          nome_pai: document.getElementById('nomePai').value.trim(),
          nome_mae: document.getElementById('nomeMae').value.trim(),
          nome_avo: document.getElementById('nomeAvo').value.trim(),
          nome_outro_responsavel: document.getElementById('nomeOutroResponsavel').value.trim(),
          responsavel_principal: document.getElementById('responsavelPrincipal').value,
          email: document.getElementById('email').value.trim(),
          telefone: document.getElementById('telefone').value.trim(),
          telefone2: document.getElementById('telefone2').value.trim(),
          endereco: document.getElementById('endereco').value.trim(),
          autorizacao_imagem: document.getElementById('autorizacaoImagem').checked,
          pergunta_1: document.getElementById('pergunta1').value.trim(),
          pergunta_2: document.getElementById('pergunta2').value.trim(),
          pergunta_3: document.getElementById('pergunta3').value.trim(),
          pergunta_4: document.getElementById('pergunta4').value.trim(),
          pergunta_5: document.getElementById('pergunta5').value.trim(),
          pergunta_6: document.getElementById('pergunta6').value.trim(),
          pergunta_7: document.getElementById('pergunta7').value.trim(),
          pergunta_8: document.getElementById('pergunta8').value.trim(),
          pergunta_9: document.getElementById('pergunta9').value.trim(),
          pergunta_10: document.getElementById('pergunta10').value.trim(),
          pergunta_11: document.getElementById('pergunta11').value.trim(),
          pergunta_12: document.getElementById('pergunta12').value.trim(),
          pergunta_13: document.getElementById('pergunta13').value.trim(),
          observacoes: document.getElementById('observacoesGerais').value.trim(),
          primeira_aula_agendada: false,
          usuario_id: currentUser.id
        };

        // Inserir paciente
        const { data, error } = await sb
          .from('pacientes')
          .insert(pacienteData)
          .select()
          .single();

        if (error) throw error;

        showLoading(false);
        showAlert('Paciente cadastrado com sucesso! ID: ' + idAluno, 'success');

        // Perguntar se quer agendar primeira aula
        if (confirm('Cadastro realizado! Deseja agendar a primeira aula agora?')) {
          window.location.href = `/agenda.html?paciente=${data.id}`;
        } else {
          window.location.href = '/alunos.html';
        }

      } catch (error) {
        showLoading(false);
        console.error('Erro ao cadastrar paciente:', error);
        showAlert('Erro ao cadastrar paciente: ' + error.message, 'danger');
      }
    });
  </script>

  <script type='module'>
    import { renderSidebar, renderHeader, loadUserName } from './js/sidebar.js';
    document.getElementById('sidebar-container').innerHTML = renderSidebar('cadastro');
    document.getElementById('header-container').innerHTML = renderHeader('Novo Cadastro', '➕');
    loadUserName();
  </script>
</body>
</html>
