<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Paciente - Aprender Ensinando</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header class="header">
    <div class="header-content">
      <a href="/dashboard.html" class="logo">
        🎓 Aprender <span>Ensinando</span>
      </a>
      <nav class="nav">
        <a href="/dashboard.html">Dashboard</a>
        <a href="/cadastro.html">Novo Paciente</a>
        <a href="/alunos.html">Pacientes</a>
        <a href="/agenda.html">Agenda</a>
        <a href="/financeiro.html">Financeiro</a>
      </nav>
      <div class="user-menu">
        <span class="user-name" id="userName">Carregando...</span>
        <button class="btn-logout" onclick="logout()">Sair</button>
      </div>
    </div>
  </header>

  <div class="container">
    <h1 class="mt-3 mb-3">📝 Cadastro e Entrevista Inicial</h1>
    
    <div class="alert alert-info">
      Preencha os dados cadastrais e as perguntas da entrevista inicial em um único formulário.
    </div>

    <form id="cadastroForm">
      <!-- DADOS CADASTRAIS -->
      <div class="card mb-3">
        <div class="card-header">
          <h2 class="card-title">👶 Dados da Criança</h2>
        </div>
        <div class="card-body">
          <div class="grid grid-2">
            <div class="form-group">
              <label for="nome" class="form-label required">Nome Completo</label>
              <input type="text" id="nome" class="form-control" required>
            </div>

            <div class="form-group">
              <label for="dataNascimento" class="form-label required">Data de Nascimento</label>
              <input type="date" id="dataNascimento" class="form-control" required>
              <small class="form-text" id="idadeCalculada"></small>
            </div>

            <div class="form-group">
              <label for="sexo" class="form-label required">Sexo</label>
              <select id="sexo" class="form-control" required>
                <option value="">Selecione...</option>
                <option value="M">Masculino</option>
                <option value="F">Feminino</option>
              </select>
            </div>

            <div class="form-group">
              <label for="nivelEscolar" class="form-label">Nível Escolar</label>
              <select id="nivelEscolar" class="form-control">
                <option value="">Selecione...</option>
                <option value="Educação Infantil">Educação Infantil</option>
                <option value="Fundamental 1">Fundamental 1 (1º ao 5º ano)</option>
                <option value="Fundamental 2">Fundamental 2 (6º ao 9º ano)</option>
                <option value="Ensino Médio">Ensino Médio</option>
              </select>
            </div>

            <div class="form-group">
              <label for="serieAno" class="form-label">Série/Ano</label>
              <input type="text" id="serieAno" class="form-control" placeholder="Ex: 3º ano">
            </div>

            <div class="form-group">
              <label for="escola" class="form-label">Escola</label>
              <input type="text" id="escola" class="form-control">
            </div>
          </div>

          <div class="form-group">
            <label for="indicacao" class="form-label">Como conheceu? (Indicação)</label>
            <input type="text" id="indicacao" class="form-control" placeholder="Ex: Indicação da Maria Silva">
          </div>
        </div>
      </div>

      <!-- DADOS DOS RESPONSÁVEIS -->
      <div class="card mb-3">
        <div class="card-header">
          <h2 class="card-title">👨‍👩‍👧 Dados dos Responsáveis</h2>
        </div>
        <div class="card-body">
          <div class="grid grid-2">
            <div class="form-group">
              <label for="nomePai" class="form-label">Nome do Pai</label>
              <input type="text" id="nomePai" class="form-control">
            </div>

            <div class="form-group">
              <label for="nomeMae" class="form-label required">Nome da Mãe</label>
              <input type="text" id="nomeMae" class="form-control" required>
            </div>

            <div class="form-group">
              <label for="nomeAvo" class="form-label">Nome do(a) Avô/Avó</label>
              <input type="text" id="nomeAvo" class="form-control">
            </div>

            <div class="form-group">
              <label for="nomeOutroResponsavel" class="form-label">Outro Responsável</label>
              <input type="text" id="nomeOutroResponsavel" class="form-control">
            </div>

            <div class="form-group">
              <label for="responsavelPrincipal" class="form-label required">Responsável Principal</label>
              <select id="responsavelPrincipal" class="form-control" required>
                <option value="">Selecione...</option>
                <option value="Mãe">Mãe</option>
                <option value="Pai">Pai</option>
                <option value="Avô/Avó">Avô/Avó</option>
                <option value="Outro">Outro</option>
              </select>
            </div>

            <div class="form-group">
              <label for="email" class="form-label">E-mail</label>
              <input type="email" id="email" class="form-control">
            </div>

            <div class="form-group">
              <label for="telefone" class="form-label required">Telefone/WhatsApp</label>
              <input type="tel" id="telefone" class="form-control" placeholder="(00) 00000-0000" required>
            </div>

            <div class="form-group">
              <label for="endereco" class="form-label">Endereço</label>
              <input type="text" id="endereco" class="form-control">
            </div>
          </div>
        </div>
      </div>

      <!-- ENTREVISTA INICIAL -->
      <div class="card mb-3">
        <div class="card-header">
          <h2 class="card-title">💬 Entrevista Inicial</h2>
        </div>
        <div class="card-body">
          <div class="form-group">
            <label for="queixa" class="form-label required">
              1) QUEIXA LIVRE: Em que posso ajudá-los? Ou o que os trouxe até aqui?
            </label>
            <textarea id="queixa" class="form-control" rows="4" required></textarea>
          </div>

          <div class="form-group">
            <label for="quandoComecou" class="form-label required">
              2) Quando começou o problema?
            </label>
            <textarea id="quandoComecou" class="form-control" rows="3" required></textarea>
          </div>

          <div class="form-group">
            <label for="comoSeSentem" class="form-label required">
              3) Como vocês se sentem diante dessa dificuldade?
            </label>
            <textarea id="comoSeSentem" class="form-control" rows="3" required></textarea>
          </div>

          <div class="form-group">
            <label for="expectativas" class="form-label">
              4) O que a escola já lhes disse sobre essa dificuldade?
            </label>
            <textarea id="expectativas" class="form-control" rows="3"></textarea>
          </div>

          <div class="form-group">
            <label for="observacoesGerais" class="form-label">Observações Gerais</label>
            <textarea id="observacoesGerais" class="form-control" rows="4" 
              placeholder="Outras informações importantes sobre o paciente..."></textarea>
          </div>
        </div>
      </div>

      <!-- BOTÕES -->
      <div class="btn-group" style="justify-content: flex-end;">
        <a href="/dashboard.html" class="btn btn-secondary">Cancelar</a>
        <button type="submit" class="btn btn-primary">
          💾 Salvar Cadastro
        </button>
      </div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const sb = window.supabase.createClient(
      'https://ukjxekdwumfxilphrrmb.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVranhla2R3dW1meGlscGhycm1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NjM1ODQsImV4cCI6MjA4ODAzOTU4NH0.c68Cp_HYU53aeSoZyNUM6RiHSDFq0Y0sPxJEAyq1nQk'
    );
    
    async function checkAuth() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) {
        window.location.href = '/index.html';
        return null;
      }
      return session;
    }
    
    async function logout() {
      await sb.auth.signOut();
      window.location.href = '/index.html';
    }
    
    function calcularIdade(dataNascimento) {
      if (!dataNascimento) return null;
      const hoje = new Date();
      const nascimento = new Date(dataNascimento);
      let idade = hoje.getFullYear() - nascimento.getFullYear();
      const mes = hoje.getMonth() - nascimento.getMonth();
      if (mes < 0 || (mes === 0 && hoje.getDate() < nascimento.getDate())) {
        idade--;
      }
      return idade;
    }
    
    function showAlert(msg, type) {
      alert(msg);
    }
    
    function showLoading(show) {
      // Implementação simples
    }
  </script>
  <script>
    let currentUser = null;

    // Carregar usuário
    (async () => {
      const session = await checkAuth();
      if (!session) return;

      const { data } = await sb.from('usuarios').select('*').eq('id', session.user.id).single();
      currentUser = data;
      if (currentUser) {
        document.getElementById('userName').textContent = currentUser.nome || currentUser.email;
      }
    })();

    // Calcular idade automaticamente
    document.getElementById('dataNascimento').addEventListener('change', (e) => {
      const idade = calcularIdade(e.target.value);
      if (idade !== null) {
        document.getElementById('idadeCalculada').textContent = `${idade} anos`;
      }
    });

    // Submeter formulário
    document.getElementById('cadastroForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      if (!confirm('Deseja salvar o cadastro deste paciente?')) {
        return;
      }

      showLoading(true);

      try {
        // Gerar ID do aluno (ALU-XX)
        const { count } = await sb
          .from('pacientes')
          .select('*', { count: 'exact', head: true });
        
        const idAluno = `ALU-${String((count || 0) + 1).padStart(3, '0')}`;

        // Preparar dados do paciente
        const pacienteData = {
          id_aluno: idAluno,
          nome: document.getElementById('nome').value.trim(),
          data_nascimento: document.getElementById('dataNascimento').value,
          sexo: document.getElementById('sexo').value,
          nivel_escolar: document.getElementById('nivelEscolar').value,
          serie_ano: document.getElementById('serieAno').value.trim(),
          escola: document.getElementById('escola').value.trim(),
          indicacao: document.getElementById('indicacao').value.trim(),
          nome_pai: document.getElementById('nomePai').value.trim(),
          nome_mae: document.getElementById('nomeMae').value.trim(),
          nome_avo: document.getElementById('nomeAvo').value.trim(),
          nome_outro_responsavel: document.getElementById('nomeOutroResponsavel').value.trim(),
          responsavel_principal: document.getElementById('responsavelPrincipal').value,
          email: document.getElementById('email').value.trim(),
          telefone: document.getElementById('telefone').value.trim(),
          endereco: document.getElementById('endereco').value.trim(),
          queixa_inicial: document.getElementById('queixa').value.trim(),
          quando_comecou: document.getElementById('quandoComecou').value.trim(),
          como_se_sentem: document.getElementById('comoSeSentem').value.trim(),
          expectativas_escola: document.getElementById('expectativas').value.trim(),
          observacoes: document.getElementById('observacoesGerais').value.trim(),
          primeira_aula_agendada: false,
          usuario_id: currentUser.id
        };

        // Inserir paciente
        const { data, error } = await sb
          .from('pacientes')
          .insert(pacienteData)
          .select()
          .single();

        if (error) throw error;

        showLoading(false);
        showAlert('Paciente cadastrado com sucesso! ID: ' + idAluno, 'success');

        // Perguntar se quer agendar primeira aula
        if (confirm('Cadastro realizado! Deseja agendar a primeira aula agora?')) {
          window.location.href = `/agenda.html?paciente=${data.id}`;
        } else {
          window.location.href = '/alunos.html';
        }

      } catch (error) {
        showLoading(false);
        console.error('Erro ao cadastrar paciente:', error);
        showAlert('Erro ao cadastrar paciente: ' + error.message, 'danger');
      }
    });
  </script>
</body>
</html>
