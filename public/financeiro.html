<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Financeiro - Aprender Ensinando</title>
  <link rel="stylesheet" href="/css/modern-layout.css">
  <style>
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      padding: 1.5rem;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-md);
      transition: all var(--transition-base);
    }

    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-xl);
    }

    .stat-card.success {
      background: linear-gradient(135deg, #10B981 0%, #059669 100%);
    }

    .stat-card.danger {
      background: linear-gradient(135deg, #EF4444 0%, #DC2626 100%);
    }

    .stat-label {
      font-size: 0.875rem;
      opacity: 0.9;
      margin-bottom: 0.5rem;
      font-weight: 500;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
    }

    .stat-icon {
      font-size: 2rem;
      margin-top: 0.5rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-sm);
    }

    .form-label {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .form-control {
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 0.9375rem;
      transition: all var(--transition-fast);
    }

    .form-control:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 190, 205, 0.1);
    }

    /* Alunos sem cobrança */
    .aluno-cobranca-card {
      background: #FEF3C7;
      border-left: 4px solid #F59E0B;
      padding: 1rem;
      border-radius: var(--radius-md);
      margin-bottom: 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .aluno-cobranca-info {
      flex: 1;
    }

    .aluno-cobranca-nome {
      font-weight: 600;
      color: #92400E;
      margin-bottom: 0.25rem;
    }

    .aluno-cobranca-desc {
      font-size: 0.875rem;
      color: #B45309;
    }

    /* Cobranças pendentes */
    .cobranca-card {
      background: white;
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      margin-bottom: 1rem;
      border-left: 4px solid #3B82F6;
    }

    .cobranca-card.vence-amanha {
      border-left-color: #F59E0B;
      background: #FFFBEB;
    }

    .cobranca-card.atrasado {
      border-left-color: #EF4444;
      background: #FEF2F2;
    }

    .cobranca-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 1rem;
    }

    .cobranca-aluno {
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .cobranca-valor {
      font-size: 1.5rem;
      font-weight: 700;
      color: #10B981;
    }

    .cobranca-detalhes {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 1rem;
      padding: 0.75rem;
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
    }

    .cobranca-detalhe {
      text-align: center;
    }

    .cobranca-detalhe-label {
      font-size: 0.75rem;
      color: var(--text-tertiary);
      margin-bottom: 0.25rem;
    }

    .cobranca-detalhe-valor {
      font-weight: 600;
      color: var(--text-primary);
    }

    .btn-dar-baixa {
      background: linear-gradient(135deg, #10B981 0%, #059669 100%);
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: var(--radius-md);
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .btn-dar-baixa:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      z-index: 1000;
      padding: 2rem;
      overflow-y: auto;
    }

    .modal-overlay.show {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: white;
      border-radius: var(--radius-xl);
      max-width: 500px;
      width: 100%;
      box-shadow: var(--shadow-xl);
      animation: modalSlideIn 0.3s ease-out;
    }

    @keyframes modalSlideIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .modal-header {
      padding: 1.5rem 2rem;
      border-bottom: 2px solid var(--border-light);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .modal-close {
      background: var(--bg-tertiary);
      border: none;
      width: 40px;
      height: 40px;
      border-radius: var(--radius-full);
      cursor: pointer;
      font-size: 1.25rem;
      transition: all var(--transition-fast);
    }

    .modal-close:hover {
      background: var(--border);
      transform: rotate(90deg);
    }

    .modal-body {
      padding: 2rem;
    }

    .modal-footer {
      padding: 1.5rem 2rem;
      border-top: 2px solid var(--border-light);
      display: flex;
      gap: 1rem;
      justify-content: flex-end;
    }

    .form-group {
      margin-bottom: var(--spacing-lg);
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--spacing-sm);
    }

    .form-label.required::after {
      content: " *";
      color: #EF4444;
    }

    .btn-large {
      padding: 1rem 2rem;
      font-size: 1.0625rem;
      font-weight: 700;
      border-radius: var(--radius-lg);
      border: none;
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .btn-primary-large {
      background: linear-gradient(135deg, #10B981 0%, #059669 100%);
      color: white;
      box-shadow: var(--shadow-md);
    }

    .btn-primary-large:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-xl);
    }

    .btn-secondary-large {
      background: white;
      color: var(--text-primary);
      border: 1px solid var(--border);
    }

    .btn-secondary-large:hover {
      background: var(--bg-secondary);
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-container"></div>

    <div class="main-content">
      <div id="header-container"></div>

      <div class="page-content">
        <!-- Botão Novo Lançamento -->
        <div style="display: flex; justify-content: flex-end; margin-bottom: var(--spacing-lg);">
          <button onclick="abrirModalNovo()" class="btn btn-primary">
            ➕ Novo Lançamento
          </button>
        </div>

        <!-- Resumo Financeiro -->
        <div class="stats-grid">
      <div class="stat-card success">
        <div class="stat-label">Receitas do Mês</div>
        <div class="stat-value" id="receitasMes">R$ 0,00</div>
        <div class="stat-icon">💵</div>
      </div>

      <div class="stat-card danger">
        <div class="stat-label">Despesas do Mês</div>
        <div class="stat-value" id="despesasMes">R$ 0,00</div>
        <div class="stat-icon">💸</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Saldo do Mês</div>
        <div class="stat-value" id="saldoMes">R$ 0,00</div>
        <div class="stat-icon">💰</div>
      </div>
    </div>

        <!-- Filtros -->
        <div class="card" style="margin-bottom: var(--spacing-lg);">
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: var(--spacing-md);">
          <div class="form-group">
            <label for="filtroTipo" class="form-label">Tipo</label>
            <select id="filtroTipo" class="form-control">
              <option value="">Todos</option>
              <option value="receita">Receitas</option>
              <option value="despesa">Despesas</option>
            </select>
          </div>

          <div class="form-group">
            <label for="filtroMes" class="form-label">Mês</label>
            <input type="month" id="filtroMes" class="form-control">
          </div>

          <div class="form-group">
            <label for="filtroCategoria" class="form-label">Categoria</label>
            <select id="filtroCategoria" class="form-control">
              <option value="">Todas</option>
              <option value="Consulta">Consulta</option>
              <option value="Avaliação">Avaliação</option>
              <option value="Material">Material</option>
              <option value="Aluguel">Aluguel</option>
              <option value="Outros">Outros</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">&nbsp;</label>
            <button onclick="carregarLancamentos()" class="btn btn-secondary btn-block">
              🔍 Filtrar
            </button>
          </div>
        </div>
      </div>
    </div>

        <!-- Configuração de Cobranças -->
        <div class="card" style="margin-bottom: var(--spacing-lg);">
          <div class="card-header">
            <h2 class="card-title">💰 Configuração de Cobranças</h2>
          </div>
          <div id="alunosSemCobranca" style="padding: var(--spacing-lg);">
            <p style="text-align: center; color: var(--text-tertiary);">Carregando...</p>
          </div>
        </div>

        <!-- Cobranças Pendentes -->
        <div class="card" style="margin-bottom: var(--spacing-lg);">
          <div class="card-header">
            <h2 class="card-title">🔔 Cobranças Pendentes</h2>
          </div>
          <div id="cobrancasPendentes" style="padding: var(--spacing-lg);">
            <p style="text-align: center; color: var(--text-tertiary);">Carregando...</p>
          </div>
        </div>

        <!-- Lista de Lançamentos -->
        <div class="card">
          <div class="card-header">
            <h2 class="card-title">📊 Lançamentos</h2>
          </div>
          <div id="listaLancamentos">
        <div class="loading">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Novo Lançamento -->
  <div id="modalLancamento" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; overflow-y: auto;">
    <div style="max-width: 600px; margin: 2rem auto; background: white; border-radius: var(--radius); padding: 2rem;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <h2 id="modalTitulo">Novo Lançamento</h2>
        <button onclick="fecharModal()" class="btn btn-secondary">✕</button>
      </div>
      
      <form id="lancamentoForm">
        <div class="form-group">
          <label for="tipoLancamento" class="form-label required">Tipo</label>
          <select id="tipoLancamento" class="form-control" required>
            <option value="">Selecione...</option>
            <option value="receita">💵 Receita</option>
            <option value="despesa">💸 Despesa</option>
          </select>
        </div>

        <div class="grid grid-2">
          <div class="form-group">
            <label for="dataLancamento" class="form-label required">Data</label>
            <input type="date" id="dataLancamento" class="form-control" required>
          </div>

          <div class="form-group">
            <label for="valorLancamento" class="form-label required">Valor</label>
            <input type="number" id="valorLancamento" class="form-control" step="0.01" min="0" required placeholder="0.00">
          </div>
        </div>

        <div class="form-group">
          <label for="categoriaLancamento" class="form-label required">Categoria</label>
          <select id="categoriaLancamento" class="form-control" required>
            <option value="">Selecione...</option>
            <option value="Consulta">Consulta</option>
            <option value="Avaliação">Avaliação</option>
            <option value="Material">Material</option>
            <option value="Aluguel">Aluguel</option>
            <option value="Outros">Outros</option>
          </select>
        </div>

        <div class="form-group">
          <label for="descricaoLancamento" class="form-label required">Descrição</label>
          <input type="text" id="descricaoLancamento" class="form-control" required placeholder="Ex: Consulta - João Silva">
        </div>

        <div class="form-group">
          <label for="pacienteLancamento" class="form-label">Paciente (se aplicável)</label>
          <select id="pacienteLancamento" class="form-control">
            <option value="">Nenhum</option>
          </select>
        </div>

        <div class="form-group">
          <label for="observacoesLancamento" class="form-label">Observações</label>
          <textarea id="observacoesLancamento" class="form-control" rows="2"></textarea>
        </div>

        <div class="btn-group" style="justify-content: flex-end;">
          <button type="button" onclick="fecharModal()" class="btn btn-secondary">Cancelar</button>
          <button type="submit" class="btn btn-primary">💾 Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const sb = window.supabase.createClient('https://ukjxekdwumfxilphrrmb.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVranhla2R3dW1meGlscGhycm1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NjM1ODQsImV4cCI6MjA4ODAzOTU4NH0.c68Cp_HYU53aeSoZyNUM6RiHSDFq0Y0sPxJEAyq1nQk');
    async function checkAuth(){const{data:{session}}=await sb.auth.getSession();if(!session){window.location.href='/index.html';return null}return session}
    async function logout(){await sb.auth.signOut();window.location.href='/index.html'}
    function formatDate(d){if(!d)return '';return new Date(d).toLocaleDateString('pt-BR')}
    function formatCurrency(v){return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0)}
    function showAlert(m,t){alert(m)}
    function showLoading(s){}
  </script>
  <script>
    let currentUser = null;
    let lancamentoEditando = null;

    (async () => {
      const session = await checkAuth();
      if (!session) return;

      const {data} = await sb.from("usuarios").select("*").eq("id", session.user.id).single(); currentUser = data;
      if (currentUser) {
        document.getElementById('userName').textContent = currentUser.nome || currentUser.email;
      }

      const hoje = new Date();
      const mesAtual = hoje.toISOString().substring(0, 7);
      document.getElementById('filtroMes').value = mesAtual;
      document.getElementById('dataLancamento').value = hoje.toISOString().split('T')[0];

      await carregarPacientes();
      await carregarLancamentos();
      await atualizarResumo();
    })();

    async function carregarPacientes() {
      try {
        const { data, error } = await sb
          .from('pacientes')
          .select('id, nome, id_aluno')
          .order('nome');

        if (error) throw error;

        const select = document.getElementById('pacienteLancamento');
        select.innerHTML = '<option value="">Nenhum</option>' +
          data.map(p => `<option value="${p.id}">${p.nome} (${p.id_aluno})</option>`).join('');

      } catch (error) {
        console.error('Erro ao carregar pacientes:', error);
      }
    }

    async function carregarLancamentos() {
      try {
        showLoading(true);

        const tipo = document.getElementById('filtroTipo').value;
        const mes = document.getElementById('filtroMes').value;
        const categoria = document.getElementById('filtroCategoria').value;

        let query = sb
          .from('financeiro')
          .select(`
            *,
            pacientes (nome, id_aluno)
          `)
          .order('data', { ascending: false });

        if (tipo) query = query.eq('tipo', tipo);
        if (categoria) query = query.eq('categoria', categoria);
        if (mes) {
          const inicioMes = mes + '-01';
          const fimMes = new Date(mes + '-01');
          fimMes.setMonth(fimMes.getMonth() + 1);
          query = query.gte('data', inicioMes).lt('data', fimMes.toISOString().split('T')[0]);
        }

        const { data: lancamentos, error } = await query;

        if (error) throw error;

        renderizarLancamentos(lancamentos || []);
        showLoading(false);

      } catch (error) {
        showLoading(false);
        console.error('Erro ao carregar lançamentos:', error);
        showAlert('Erro ao carregar lançamentos', 'danger');
      }
    }

    function renderizarLancamentos(lancamentos) {
      const container = document.getElementById('listaLancamentos');

      if (lancamentos.length === 0) {
        container.innerHTML = '<p class="text-secondary text-center">Nenhum lançamento encontrado</p>';
        return;
      }

      container.innerHTML = `
        <div class="table-responsive">
          <table class="table">
            <thead>
              <tr>
                <th>Data</th>
                <th>Tipo</th>
                <th>Categoria</th>
                <th>Descrição</th>
                <th>Paciente</th>
                <th>Valor</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody>
              ${lancamentos.map(l => `
                <tr>
                  <td>${formatDate(l.data)}</td>
                  <td>
                    ${l.tipo === 'receita' 
                      ? '<span class="badge badge-success">Receita</span>' 
                      : '<span class="badge badge-danger">Despesa</span>'}
                  </td>
                  <td>${l.categoria}</td>
                  <td>
                    <strong>${l.descricao}</strong>
                    ${l.observacoes ? `<br><small style="color: var(--text-secondary);">${l.observacoes}</small>` : ''}
                  </td>
                  <td>${l.pacientes?.nome || '-'}</td>
                  <td>
                    <strong style="color: ${l.tipo === 'receita' ? 'var(--success)' : 'var(--danger)'};">
                      ${formatCurrency(l.valor)}
                    </strong>
                  </td>
                  <td>
                    <button onclick="excluirLancamento('${l.id}')" class="btn btn-danger" style="padding: 0.25rem 0.75rem; font-size: 0.875rem;">
                      🗑️
                    </button>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    async function atualizarResumo() {
      try {
        const mes = document.getElementById('filtroMes').value;
        const inicioMes = mes + '-01';
        const fimMes = new Date(mes + '-01');
        fimMes.setMonth(fimMes.getMonth() + 1);

        // Receitas
        const { data: receitas } = await sb
          .from('financeiro')
          .select('valor')
          .eq('tipo', 'receita')
          .gte('data', inicioMes)
          .lt('data', fimMes.toISOString().split('T')[0]);

        const totalReceitas = receitas?.reduce((sum, r) => sum + (r.valor || 0), 0) || 0;
        document.getElementById('receitasMes').textContent = formatCurrency(totalReceitas);

        // Despesas
        const { data: despesas } = await sb
          .from('financeiro')
          .select('valor')
          .eq('tipo', 'despesa')
          .gte('data', inicioMes)
          .lt('data', fimMes.toISOString().split('T')[0]);

        const totalDespesas = despesas?.reduce((sum, d) => sum + (d.valor || 0), 0) || 0;
        document.getElementById('despesasMes').textContent = formatCurrency(totalDespesas);

        // Saldo
        const saldo = totalReceitas - totalDespesas;
        const saldoElement = document.getElementById('saldoMes');
        saldoElement.textContent = formatCurrency(saldo);
        saldoElement.style.color = saldo >= 0 ? 'var(--success)' : 'var(--danger)';

      } catch (error) {
        console.error('Erro ao atualizar resumo:', error);
      }
    }

    function abrirModalNovo() {
      lancamentoEditando = null;
      document.getElementById('modalTitulo').textContent = 'Novo Lançamento';
      document.getElementById('lancamentoForm').reset();
      
      const hoje = new Date().toISOString().split('T')[0];
      document.getElementById('dataLancamento').value = hoje;

      document.getElementById('modalLancamento').style.display = 'block';
    }

    async function excluirLancamento(id) {
      if (!confirm('Deseja realmente excluir este lançamento?')) return;

      try {
        showLoading(true);

        const { error } = await sb
          .from('financeiro')
          .delete()
          .eq('id', id);

        if (error) throw error;

        showAlert('Lançamento excluído com sucesso!', 'success');
        await carregarLancamentos();
        await atualizarResumo();

      } catch (error) {
        console.error('Erro ao excluir lançamento:', error);
        showAlert('Erro ao excluir lançamento', 'danger');
      } finally {
        showLoading(false);
      }
    }

    function fecharModal() {
      document.getElementById('modalLancamento').style.display = 'none';
      lancamentoEditando = null;
    }

    document.getElementById('lancamentoForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const tipo = document.getElementById('tipoLancamento').value;
      const data = document.getElementById('dataLancamento').value;
      const valor = parseFloat(document.getElementById('valorLancamento').value);
      const categoria = document.getElementById('categoriaLancamento').value;
      const descricao = document.getElementById('descricaoLancamento').value.trim();
      const pacienteId = document.getElementById('pacienteLancamento').value || null;
      const observacoes = document.getElementById('observacoesLancamento').value.trim();

      if (!tipo || !data || !valor || !categoria || !descricao) {
        showAlert('Preencha todos os campos obrigatórios', 'warning');
        return;
      }

      try {
        showLoading(true);

        const lancamentoData = {
          tipo,
          data,
          valor,
          categoria,
          descricao,
          paciente_id: pacienteId,
          observacoes,
          usuario_id: currentUser.id
        };

        const { error } = await sb
          .from('financeiro')
          .insert(lancamentoData);

        if (error) throw error;

        showAlert('Lançamento salvo com sucesso!', 'success');
        fecharModal();
        await carregarLancamentos();
        await atualizarResumo();

      } catch (error) {
        console.error('Erro ao salvar lançamento:', error);
        showAlert('Erro ao salvar lançamento: ' + error.message, 'danger');
      } finally {
        showLoading(false);
      }
    });

    document.getElementById('modalLancamento').addEventListener('click', (e) => {
      if (e.target.id === 'modalLancamento') {
        fecharModal();
      }
    });

    document.getElementById('filtroMes').addEventListener('change', async () => {
      await carregarLancamentos();
      await atualizarResumo();
    });

    // ==========================================
    // SISTEMA DE COBRANÇA
    // ==========================================

    // Carregar alunos sem configuração de cobrança
    async function carregarAlunosSemCobranca() {
      try {
        const { data: { user } } = await sb.auth.getUser();

        const { data: alunos, error } = await sb
          .from('pacientes')
          .select('id, nome')
          .eq('usuario_id', user.id)
          .or('valor_aula.is.null,dia_vencimento.is.null,cobranca_ativa.eq.false');

        if (error) throw error;

        const container = document.getElementById('alunosSemCobranca');

        if (!alunos || alunos.length === 0) {
          container.innerHTML = '<p style="text-align: center; color: var(--text-tertiary);">✅ Todos os alunos estão com cobrança configurada!</p>';
          return;
        }

        container.innerHTML = alunos.map(aluno => `
          <div class="aluno-cobranca-card">
            <div class="aluno-cobranca-info">
              <div class="aluno-cobranca-nome">${aluno.nome}</div>
              <div class="aluno-cobranca-desc">🔴 Sem configuração de cobrança</div>
            </div>
            <button onclick="abrirModalConfigurarCobranca('${aluno.id}', '${aluno.nome}')" class="btn btn-primary">
              ⚙️ Configurar
            </button>
          </div>
        `).join('');
      } catch (error) {
        console.error('Erro ao carregar alunos:', error);
      }
    }

    // Abrir modal configurar cobrança
    window.abrirModalConfigurarCobranca = function(alunoId, alunoNome) {
      document.getElementById('alunoIdCobranca').value = alunoId;
      document.getElementById('alunoNomeCobranca').textContent = alunoNome;
      document.getElementById('formCobranca').reset();
      document.getElementById('modalConfigurarCobranca').classList.add('show');
    };

    window.fecharModalCobranca = function() {
      document.getElementById('modalConfigurarCobranca').classList.remove('show');
    };

    // Salvar configuração de cobrança
    window.salvarCobranca = async function(e) {
      e.preventDefault();

      const alunoId = document.getElementById('alunoIdCobranca').value;
      const valorAula = parseFloat(document.getElementById('valorAula').value);
      const diaVencimento = parseInt(document.getElementById('diaVencimento').value);
      const formaPagamento = document.getElementById('formaPagamento').value;

      try {
        // Buscar data da primeira aula
        const { data: primeiraAula } = await sb
          .from('aulas')
          .select('data')
          .eq('paciente_id', alunoId)
          .order('data', { ascending: true })
          .limit(1)
          .single();

        const dataInicio = primeiraAula?.data || new Date().toISOString().split('T')[0];

        // Atualizar paciente
        const { error } = await sb
          .from('pacientes')
          .update({
            valor_aula: valorAula,
            dia_vencimento: diaVencimento,
            forma_pagamento: formaPagamento,
            data_inicio_cobranca: dataInicio,
            cobranca_ativa: true
          })
          .eq('id', alunoId);

        if (error) throw error;

        alert('✅ Configuração de cobrança salva com sucesso!');
        fecharModalCobranca();
        carregarAlunosSemCobranca();
        carregarCobrancasPendentes();
      } catch (error) {
        console.error('Erro:', error);
        alert('❌ Erro ao salvar configuração');
      }
    };

    // Carregar cobranças pendentes
    async function carregarCobrancasPendentes() {
      try {
        const { data: { user } } = await sb.auth.getUser();
        
        // Buscar pacientes com cobrança ativa
        const { data: pacientes, error: errPacientes } = await sb
          .from('pacientes')
          .select('id, nome, valor_aula, dia_vencimento, forma_pagamento, data_inicio_cobranca')
          .eq('usuario_id', user.id)
          .eq('cobranca_ativa', true);

        if (errPacientes) throw errPacientes;

        const container = document.getElementById('cobrancasPendentes');

        if (!pacientes || pacientes.length === 0) {
          container.innerHTML = '<p style="text-align: center; color: var(--text-tertiary);">Nenhuma cobrança pendente</p>';
          return;
        }

        const hoje = new Date();
        const mes = hoje.getMonth();
        const ano = hoje.getFullYear();
        
        let cobrancasHTML = [];

        for (const paciente of pacientes) {
          // Calcular período de cobrança
          const diaVenc = paciente.dia_vencimento;
          const dataInicio = new Date(ano, mes - 1, diaVenc);
          const dataFim = new Date(ano, mes, diaVenc - 1);
          const dataVencimento = new Date(ano, mes, diaVenc);

          // Contar aulas do período
          const { data: aulas } = await sb
            .from('aulas')
            .select('id')
            .eq('paciente_id', paciente.id)
            .gte('data', dataInicio.toISOString().split('T')[0])
            .lte('data', dataFim.toISOString().split('T')[0]);

          const totalAulas = aulas?.length || 0;
          
          if (totalAulas === 0) continue; // Pular se não teve aulas no período

          const valorTotal = totalAulas * paciente.valor_aula;

          // Verificar se já tem mensalidade criada
          const { data: mensalidade } = await sb
            .from('mensalidades')
            .select('id, status')
            .eq('paciente_id', paciente.id)
            .eq('data_vencimento', dataVencimento.toISOString().split('T')[0])
            .maybeSingle();

          if (mensalidade && mensalidade.status === 'pago') continue; // Já foi pago

          const diasAteVencimento = Math.ceil((dataVencimento - hoje) / (1000 * 60 * 60 * 24));
          let statusClass = '';
          let statusLabel = '🔵 Pendente';

          if (diasAteVencimento < 0) {
            statusClass = 'atrasado';
            statusLabel = '🔴 Atrasado';
          } else if (diasAteVencimento <= 1) {
            statusClass = 'vence-amanha';
            statusLabel = '🟡 Vence amanhã!';
          }

          cobrancasHTML.push(`
            <div class="cobranca-card ${statusClass}">
              <div class="cobranca-header">
                <div class="cobranca-aluno">${paciente.nome}</div>
                <div class="cobranca-valor">R$ ${valorTotal.toFixed(2)}</div>
              </div>
              
              <div class="cobranca-detalhes">
                <div class="cobranca-detalhe">
                  <div class="cobranca-detalhe-label">Período</div>
                  <div class="cobranca-detalhe-valor">${dataInicio.toLocaleDateString('pt-BR', {day: '2-digit', month: '2-digit'})} a ${dataFim.toLocaleDateString('pt-BR', {day: '2-digit', month: '2-digit'})}</div>
                </div>
                <div class="cobranca-detalhe">
                  <div class="cobranca-detalhe-label">Aulas</div>
                  <div class="cobranca-detalhe-valor">${totalAulas} × R$ ${paciente.valor_aula.toFixed(2)}</div>
                </div>
                <div class="cobranca-detalhe">
                  <div class="cobranca-detalhe-label">Vencimento</div>
                  <div class="cobranca-detalhe-valor">${dataVencimento.toLocaleDateString('pt-BR')}</div>
                </div>
              </div>

              <div style="display: flex; justify-content: space-between; align-items: center;">
                <div style="font-weight: 600; color: ${statusClass === 'atrasado' ? '#EF4444' : statusClass === 'vence-amanha' ? '#F59E0B' : '#3B82F6'};">${statusLabel}</div>
                <button onclick="abrirModalDarBaixa('${paciente.id}', '${paciente.nome}', ${valorTotal}, ${totalAulas}, '${dataInicio.toISOString().split('T')[0]}', '${dataFim.toISOString().split('T')[0]}', '${dataVencimento.toISOString().split('T')[0]}', ${paciente.valor_aula}, '${paciente.forma_pagamento}')" class="btn-dar-baixa">
                  ✅ Dar Baixa
                </button>
              </div>
            </div>
          `);
        }

        if (cobrancasHTML.length === 0) {
          container.innerHTML = '<p style="text-align: center; color: var(--text-tertiary);">✅ Nenhuma cobrança pendente este mês!</p>';
        } else {
          container.innerHTML = cobrancasHTML.join('');
        }
      } catch (error) {
        console.error('Erro ao carregar cobranças:', error);
      }
    }

    // Abrir modal dar baixa
    window.abrirModalDarBaixa = function(pacienteId, nome, valorTotal, totalAulas, dataInicio, dataFim, dataVencimento, valorAula, formaPagamento) {
      window.dadosBaixa = { pacienteId, totalAulas, dataInicio, dataFim, dataVencimento, valorAula, formaPagamento };
      
      document.getElementById('alunoNomeBaixa').textContent = nome;
      document.getElementById('valorBaixa').textContent = `R$ ${valorTotal.toFixed(2)}`;
      document.getElementById('dataPagamento').value = new Date().toISOString().split('T')[0];
      document.getElementById('formBaixa').reset();
      document.getElementById('modalDarBaixa').classList.add('show');
    };

    window.fecharModalBaixa = function() {
      document.getElementById('modalDarBaixa').classList.remove('show');
    };

    // Confirmar baixa
    window.confirmarBaixa = async function(e) {
      e.preventDefault();

      const dataPagamento = document.getElementById('dataPagamento').value;
      const observacoes = document.getElementById('observacoesBaixa').value;
      const { pacienteId, totalAulas, dataInicio, dataFim, dataVencimento, valorAula, formaPagamento } = window.dadosBaixa;

      try {
        const { data: { user } } = await sb.auth.getUser();
        
        // Criar/atualizar mensalidade
        const { error } = await sb
          .from('mensalidades')
          .upsert({
            paciente_id: pacienteId,
            usuario_id: user.id,
            data_inicio: dataInicio,
            data_fim: dataFim,
            total_aulas: totalAulas,
            valor_aula: valorAula,
            valor_total: totalAulas * valorAula,
            status: 'pago',
            data_vencimento: dataVencimento,
            data_pagamento: dataPagamento,
            forma_pagamento: formaPagamento,
            observacoes: observacoes
          }, {
            onConflict: 'paciente_id,data_vencimento'
          });

        if (error) throw error;

        alert('✅ Pagamento registrado com sucesso!');
        fecharModalBaixa();
        carregarCobrancasPendentes();
        atualizarResumo();
      } catch (error) {
        console.error('Erro:', error);
        alert('❌ Erro ao registrar pagamento');
      }
    };

    // Inicializar
    carregarAlunosSemCobranca();
    carregarCobrancasPendentes();
  </script>

  <!-- Modal Configurar Cobrança -->
  <div id="modalConfigurarCobranca" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title">💰 Configurar Cobrança</h2>
        <button onclick="fecharModalCobranca()" class="modal-close">✕</button>
      </div>

      <form id="formCobranca" onsubmit="salvarCobranca(event)">
        <div class="modal-body">
          <input type="hidden" id="alunoIdCobranca">
          
          <div class="form-group">
            <label class="form-label">Aluno</label>
            <div id="alunoNomeCobranca" style="font-weight: 600; color: var(--text-primary);"></div>
          </div>

          <div class="form-group">
            <label for="valorAula" class="form-label required">Valor por Aula (R$)</label>
            <input type="number" id="valorAula" class="form-control" step="0.01" min="0" placeholder="80.00" required>
          </div>

          <div class="form-group">
            <label for="diaVencimento" class="form-label required">Dia de Vencimento</label>

              <option value="">Selecione o dia do mês</option>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
              <option value="6">6</option>
              <option value="7">7</option>
              <option value="8">8</option>
              <option value="9">9</option>
              <option value="10">10</option>
              <option value="11">11</option>
              <option value="12">12</option>
              <option value="13">13</option>
              <option value="14">14</option>
              <option value="15">15</option>
              <option value="16">16</option>
              <option value="17">17</option>
              <option value="18">18</option>
              <option value="19">19</option>
              <option value="20">20</option>
              <option value="21">21</option>
              <option value="22">22</option>
              <option value="23">23</option>
              <option value="24">24</option>
              <option value="25">25</option>
              <option value="26">26</option>
              <option value="27">27</option>
              <option value="28">28</option>
            </select>
            <small style="color: var(--text-tertiary); font-size: 0.75rem;">
              Cobrança será gerada todo dia escolhido do mês
            </small>
          </div>

          <div class="form-group">
            <label for="formaPagamento" class="form-label required">Forma de Pagamento</label>
            <select id="formaPagamento" class="form-control" required>
              <option value="">Selecione...</option>
              <option value="PIX">PIX</option>
              <option value="Dinheiro">Dinheiro</option>
              <option value="Transferência">Transferência</option>
              <option value="Cartão">Cartão</option>
              <option value="Boleto">Boleto</option>
            </select>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" onclick="fecharModalCobranca()" class="btn-large btn-secondary-large">
            Cancelar
          </button>
          <button type="submit" class="btn-large btn-primary-large">
            💾 Salvar Configuração
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal Dar Baixa -->
  <div id="modalDarBaixa" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title">💵 Registrar Pagamento</h2>
        <button onclick="fecharModalBaixa()" class="modal-close">✕</button>
      </div>

      <form id="formBaixa" onsubmit="confirmarBaixa(event)">
        <div class="modal-body">
          <input type="hidden" id="mensalidadeId">
          
          <div class="form-group">
            <label class="form-label">Aluno</label>
            <div id="alunoNomeBaixa" style="font-weight: 600; color: var(--text-primary);"></div>
          </div>

          <div class="form-group">
            <label class="form-label">Valor</label>
            <div id="valorBaixa" style="font-size: 1.5rem; font-weight: 700; color: #10B981;"></div>
          </div>

          <div class="form-group">
            <label for="dataPagamento" class="form-label required">Data do Recebimento</label>
            <input type="date" id="dataPagamento" class="form-control" required>
          </div>

          <div class="form-group">
            <label for="observacoesBaixa" class="form-label">Observações</label>
            <textarea id="observacoesBaixa" class="form-control" rows="3" placeholder="Ex: Recebido via PIX"></textarea>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" onclick="fecharModalBaixa()" class="btn-large btn-secondary-large">
            Cancelar
          </button>
          <button type="submit" class="btn-large btn-primary-large">
            ✅ Confirmar Recebimento
          </button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { renderSidebar, renderHeader, loadUserName } from './js/sidebar.js';
    document.getElementById('sidebar-container').innerHTML = renderSidebar('financeiro');
    document.getElementById('header-container').innerHTML = renderHeader('Financeiro', '💰');
    loadUserName();
  </script>
