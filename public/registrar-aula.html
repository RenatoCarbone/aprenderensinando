<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aulas do Dia - Aprender Ensinando</title>
  <link rel="stylesheet" href="/css/modern-layout.css">
  <style>
    .aula-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 2rem;
      border-radius: 10px;
      margin-bottom: 2rem;
    }

    .data-aula {
      font-size: 1.5rem;
      font-weight: bold;
      margin-bottom: 0.5rem;
    }

    .info-agendamentos {
      background: rgba(255,255,255,0.2);
      padding: 1rem;
      border-radius: 5px;
      margin-top: 1rem;
    }

    .agendamentos-list {
      display: grid;
      gap: 1rem;
    }

    .agendamento-card {
      background: white;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      padding: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s;
    }

    .agendamento-card:hover {
      border-color: #667eea;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
    }

    .agendamento-card.concluida {
      background: #f0fff4;
      border-color: #48bb78;
    }

    .agendamento-card.concluida:hover {
      border-color: #38a169;
      box-shadow: 0 4px 12px rgba(72, 187, 120, 0.15);
    }

    .agendamento-info {
      flex: 1;
    }

    .aluno-nome {
      font-size: 1.3rem;
      font-weight: 600;
      color: #2d3748;
      margin-bottom: 0.5rem;
    }

    .agendamento-hora {
      font-size: 1rem;
      color: #718096;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-iniciar {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .btn-iniciar:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .btn-iniciar:disabled {
      background: #cbd5e0;
      cursor: not-allowed;
      transform: none;
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: #718096;
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: #718096;
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    /* Modal Moderno */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      z-index: 1000;
      overflow-y: auto;
      padding: 2rem;
    }

    .modal.show {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: white;
      border-radius: var(--radius-xl);
      max-width: 700px;
      width: 100%;
      box-shadow: var(--shadow-xl);
      animation: modalSlideIn 0.3s ease-out;
    }

    @keyframes modalSlideIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-header {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      padding: 2rem;
      border-bottom: 2px solid var(--border-light);
    }

    .modal-header h2 {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0;
    }

    .modal-header p {
      font-size: 1rem;
      color: var(--text-secondary);
      margin: 0;
    }

    .modal-body {
      padding: 2rem;
    }

    .modal-footer {
      padding: 1.5rem 2rem;
      border-top: 2px solid var(--border-light);
      display: flex;
      gap: 1rem;
    }

    .form-group {
      margin-bottom: var(--spacing-lg);
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--spacing-sm);
    }

    .form-label.required::after {
      content: " *";
      color: #EF4444;
    }

    .form-control {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 0.9375rem;
      transition: all var(--transition-fast);
      font-family: inherit;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 190, 205, 0.1);
    }

    textarea.form-control {
      resize: vertical;
      min-height: 80px;
    }

    .btn-large {
      padding: 1rem 2rem;
      font-size: 1.0625rem;
      font-weight: 700;
      border-radius: var(--radius-lg);
      border: none;
      cursor: pointer;
      transition: all var(--transition-fast);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-primary-large {
      background: linear-gradient(135deg, #10B981 0%, #059669 100%);
      color: white;
      box-shadow: var(--shadow-md);
    }

    .btn-primary-large:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .btn-secondary-large {
      background: white;
      color: var(--text-primary);
      border: 1px solid var(--border);
    }

    .btn-secondary-large:hover {
      background: var(--bg-secondary);
    }

    .badge-success {
      background: #48bb78;
      color: white;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 600;
    }

    .badge-pendente {
      background: #ed8936;
      color: white;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 600;
    }

    .btn-ver {
      background: #48bb78;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .btn-ver:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(72, 187, 120, 0.4);
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-container"></div>

    <div class="main-content">
      <div id="header-container"></div>

      <div class="page-content">
        <div class="aula-header">
          <div class="data-aula" id="dataAula">Carregando...</div>
          <div class="info-agendamentos">
            <span id="totalAgendamentos">0</span> aulas agendadas para hoje
          </div>
        </div>

        <div id="loadingState" class="loading">
          <p>⏳ Carregando aulas...</p>
        </div>

        <div id="emptyState" class="empty-state" style="display: none;">
          <div class="empty-state-icon">📅</div>
          <h3>Nenhuma aula agendada para hoje</h3>
          <p>Não há aulas cadastradas para esta data.</p>
          <a href="agenda.html" class="btn-primary" style="margin-top: 1rem;">
            Ver agenda completa
          </a>
        </div>

        <div id="agendamentosList" class="agendamentos-list" style="display: none;">
          <!-- Será preenchido dinamicamente -->
        </div>

        <div style="margin-top: 2rem;">
          <a href="dashboard.html" class="btn-secondary">
            ← Voltar ao Dashboard
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal de Registro de Aula -->
  <div id="modalAula" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitulo">Registrar Aula</h2>
        <p id="modalSubtitulo"></p>
      </div>

      <form id="formRegistrarAula">
        <div class="modal-body">
          <div class="form-group">
            <label for="conteudoAplicado" class="form-label required">O que foi aplicado hoje</label>
            <textarea id="conteudoAplicado" class="form-control" rows="4" 
              placeholder="Descreva as atividades, exercícios e conteúdo trabalhado com este aluno..." required></textarea>
          </div>

          <div class="form-group">
            <label for="observacoesGerais" class="form-label">Observações Gerais</label>
            <textarea id="observacoesGerais" class="form-control" rows="3" 
              placeholder="Observações sobre o desempenho, comportamento, evolução..."></textarea>
          </div>

          <div class="form-group">
            <label for="mensagemResponsavel" class="form-label">Mensagem para o Responsável</label>
            <textarea id="mensagemResponsavel" class="form-control" rows="3" 
              placeholder="Mensagem que será enviada aos pais/responsáveis sobre esta aula..."></textarea>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn-large btn-secondary-large" onclick="fecharModal()">
            ❌ Cancelar
          </button>
          <button type="submit" class="btn-large btn-primary-large" style="flex: 1;">
            💾 Salvar e Finalizar Aula
          </button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { supabase } from './js/supabase.js';

    // Formatar data de hoje
    const hoje = new Date();
    const dataFormatada = hoje.toLocaleDateString('pt-BR', { 
      weekday: 'long', 
      year: 'numeric', 
      month: 'long', 
      day: 'numeric' 
    });
    document.getElementById('dataAula').textContent = dataFormatada;

    // Data em formato SQL (corrigido para usar horário local)
    const ano = hoje.getFullYear();
    const mes = String(hoje.getMonth() + 1).padStart(2, '0');
    const dia = String(hoje.getDate()).padStart(2, '0');
    
    // Filtros de início e fim do dia
    const inicioDia = `${ano}-${mes}-${dia} 00:00:00`;
    const fimDia = `${ano}-${mes}-${dia} 23:59:59`;
    
    console.log('Buscando aulas entre:', inicioDia, 'e', fimDia);

    let agendamentos = [];
    let agendamentoAtual = null;
    let aulasRealizadas = [];

    // Buscar agendamentos do dia
    async function carregarAgendamentos() {
      try {
        const { data: user } = await supabase.auth.getUser();
        if (!user?.user) {
          window.location.href = 'login.html';
          return;
        }

        // Buscar agendamentos
        const { data, error } = await supabase
          .from('agendamentos')
          .select(`
            *,
            pacientes (
              id,
              nome,
              data_nascimento,
              nome_mae,
              telefone
            )
          `)
          .gte('data_hora', inicioDia)
          .lte('data_hora', fimDia)
          .eq('usuario_id', user.user.id)
          .order('data_hora');

        if (error) throw error;

        agendamentos = data || [];

        // Buscar aulas já realizadas hoje
        const dataSQL = `${ano}-${mes}-${dia}`;
        const { data: aulas, error: erroAulas } = await supabase
          .from('aulas')
          .select('id, paciente_id, agendamento_id')
          .eq('data', dataSQL)
          .eq('profissional_id', user.user.id);

        if (!erroAulas) {
          aulasRealizadas = aulas || [];
        }

        document.getElementById('loadingState').style.display = 'none';

        if (agendamentos.length === 0) {
          document.getElementById('emptyState').style.display = 'block';
          return;
        }

        document.getElementById('totalAgendamentos').textContent = agendamentos.length;
        document.getElementById('agendamentosList').style.display = 'block';

        renderizarAgendamentos();

      } catch (error) {
        console.error('Erro ao carregar agendamentos:', error);
        alert('Erro ao carregar aulas: ' + error.message);
      }
    }

    // Renderizar lista de agendamentos
    function renderizarAgendamentos() {
      const container = document.getElementById('agendamentosList');
      
      // Separar concluídas e pendentes
      const pendentes = [];
      const concluidas = [];

      agendamentos.forEach(agendamento => {
        // Verifica se este agendamento ESPECÍFICO foi realizado
        const aulaRealizada = aulasRealizadas.find(a => 
          a.agendamento_id === agendamento.id
        );

        if (aulaRealizada) {
          concluidas.push({ ...agendamento, aula_id: aulaRealizada.id });
        } else {
          pendentes.push(agendamento);
        }
      });

      // Renderizar: pendentes primeiro, depois concluídas
      const todos = [...pendentes, ...concluidas];

      container.innerHTML = todos.map(agendamento => {
        // Corrigir horário (forçar interpretação local)
        const dataHora = new Date(agendamento.data_hora);
        const horario = dataHora.toLocaleTimeString('pt-BR', { 
          hour: '2-digit', 
          minute: '2-digit',
          timeZone: 'America/Sao_Paulo' // Força horário de Brasília
        });

        const concluida = !!agendamento.aula_id;

        return `
          <div class="agendamento-card ${concluida ? 'concluida' : ''}">
            <div class="agendamento-info">
              <div class="aluno-nome">
                ${agendamento.pacientes?.nome || '💬 Avaliação Inicial'}
                ${concluida ? '<span class="badge-success" style="margin-left: 0.5rem;">✅ Concluída</span>' : ''}
              </div>
              <div class="agendamento-hora">
                🕐 ${horario}
                ${agendamento.observacoes ? `<span style="color: #718096;">• ${agendamento.observacoes}</span>` : ''}
              </div>
            </div>
            ${concluida ? `
              <a 
                href="historico-aluno.html?id=${agendamento.pacientes.id}" 
                class="btn-ver"
              >
                👁️ Ver Aula
              </a>
            ` : `
              <button 
                class="btn-iniciar" 
                onclick="abrirModalAula('${agendamento.id}')"
              >
                📝 Iniciar Aula
              </button>
            `}
          </div>
        `;
      }).join('');
    }

    // Abrir modal para registrar aula
    window.abrirModalAula = function(agendamentoId) {
      agendamentoAtual = agendamentos.find(a => a.id === agendamentoId);
      
      if (!agendamentoAtual) return;

      const dataHora = new Date(agendamentoAtual.data_hora);
      const horario = dataHora.toLocaleTimeString('pt-BR', { 
        hour: '2-digit', 
        minute: '2-digit',
        timeZone: 'America/Sao_Paulo'
      });

      document.getElementById('modalTitulo').textContent = agendamentoAtual.pacientes?.nome || '💬 Avaliação Inicial';
      document.getElementById('modalSubtitulo').textContent = `Aula de ${horario}`;
      
      // Limpar campos
      document.getElementById('conteudoAplicado').value = '';
      document.getElementById('observacoesGerais').value = '';
      document.getElementById('mensagemResponsavel').value = '';

      document.getElementById('modalAula').classList.add('show');
    };

    // Fechar modal
    window.fecharModal = function() {
      document.getElementById('modalAula').classList.remove('show');
      agendamentoAtual = null;
    };

    // Salvar registro da aula
    document.getElementById('formRegistrarAula').addEventListener('submit', async (e) => {
      e.preventDefault();

      if (!agendamentoAtual) return;

      const btnSubmit = e.target.querySelector('button[type="submit"]');
      btnSubmit.disabled = true;
      btnSubmit.textContent = '⏳ Salvando...';

      try {
        const { data: user } = await supabase.auth.getUser();

        const dataHora = new Date(agendamentoAtual.data_hora);

        // Corrigir data para formato local (evitar problema de UTC)
        const ano = dataHora.getFullYear();
        const mes = String(dataHora.getMonth() + 1).padStart(2, '0');
        const dia = String(dataHora.getDate()).padStart(2, '0');
        const dataLocal = `${ano}-${mes}-${dia}`;

        // Criar registro da aula
        const { data: aula, error: erroAula } = await supabase
          .from('aulas')
          .insert({
            paciente_id: agendamentoAtual.pacientes.id,
            agendamento_id: agendamentoAtual.id,
            data: dataLocal,
            horario: dataHora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', timeZone: 'America/Sao_Paulo' }),
            conteudo_aplicado: document.getElementById('conteudoAplicado').value,
            observacoes_gerais: document.getElementById('observacoesGerais').value || null,
            mensagem_responsavel: document.getElementById('mensagemResponsavel').value || null,
            profissional_id: user.user.id
          })
          .select()
          .single();

        if (erroAula) throw erroAula;

        alert('✅ Aula registrada com sucesso!');
        fecharModal();
        
        // Recarregar lista para atualizar status
        carregarAgendamentos();

      } catch (error) {
        console.error('Erro ao salvar aula:', error);
        alert('Erro ao salvar aula: ' + error.message);
        btnSubmit.disabled = false;
        btnSubmit.textContent = '💾 Salvar e Finalizar Aula';
      }
    });

    // Carregar ao iniciar
    carregarAgendamentos();
  </script>

  <script type='module'>
    import { renderSidebar, renderHeader, loadUserName } from './js/sidebar.js';
    document.getElementById('sidebar-container').innerHTML = renderSidebar('registrar-aula');
    document.getElementById('header-container').innerHTML = renderHeader('Nova Aula', '📚');
    loadUserName();
  </script>
</body>
</html>
