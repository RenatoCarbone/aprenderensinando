<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Teste - Aprender Ensinando</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h1 class="login-title">🎓 Aprender Ensinando</h1>
        <p class="login-subtitle">Sistema de Gestão Psicopedagógica</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email" class="form-label required">E-mail</label>
          <input type="email" id="email" class="form-control" placeholder="seu@email.com" required>
        </div>

        <div class="form-group">
          <label for="password" class="form-label required">Senha</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>

        <div id="errorMessage" class="alert alert-danger hidden"></div>

        <button type="submit" class="btn btn-primary btn-block">Entrar</button>
      </form>

      <div class="text-center mt-4" style="padding-top: 1rem; border-top: 1px solid var(--border-color);">
        <p class="text-secondary" style="font-size: 0.875rem;">
          Primeiro acesso? 
          <a href="#" id="createAccount" style="color: var(--accent); text-decoration: none;">
            Criar conta
          </a>
        </p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function() {
      // Inicializar Supabase
      const sb = window.supabase.createClient(
        'https://ukjxekdwumfxilphrrmb.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVranhla2R3dW1meGlscGhycm1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NjM1ODQsImV4cCI6MjA4ODAzOTU4NH0.c68Cp_HYU53aeSoZyNUM6RiHSDFq0Y0sPxJEAyq1nQk'
      );

      const form = document.getElementById('loginForm');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const errorDiv = document.getElementById('errorMessage');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        errorDiv.classList.add('hidden');
        
        try {
          const { data, error } = await sb.auth.signInWithPassword({
            email: emailInput.value.trim(),
            password: passwordInput.value
          });

          if (error) throw error;

          // Redirecionar para dashboard
          window.location.href = '/dashboard.html';
          
        } catch (error) {
          console.error('Erro:', error);
          errorDiv.textContent = 'Erro ao fazer login: ' + error.message;
          errorDiv.classList.remove('hidden');
        }
      });

      // Criar conta
      const createAccountLink = document.getElementById('createAccount');
      if (createAccountLink) {
        createAccountLink.addEventListener('click', async (e) => {
          e.preventDefault();
          
          const email = prompt('Digite seu e-mail:');
          if (!email) return;

          const password = prompt('Digite uma senha (mínimo 6 caracteres):');
          if (!password || password.length < 6) {
            alert('Senha deve ter no mínimo 6 caracteres');
            return;
          }

          const nome = prompt('Digite seu nome completo:');
          if (!nome) return;

          try {
            // Criar usuário
            const { data: authData, error: authError } = await sb.auth.signUp({
              email,
              password,
              options: {
                emailRedirectTo: window.location.origin,
                data: { nome }
              }
            });

            if (authError) throw authError;

            // Criar perfil
            const { error: profileError } = await sb
              .from('usuarios')
              .insert({
                id: authData.user.id,
                email: email,
                nome: nome
              });

            if (profileError) throw profileError;

            alert('Conta criada com sucesso! Faça login para continuar.');
            emailInput.value = email;
            passwordInput.value = '';
            
          } catch (error) {
            console.error('Erro ao criar conta:', error);
            alert('Erro ao criar conta: ' + error.message);
          }
        });
      }
    })();
  </script>
</body>
</html>
