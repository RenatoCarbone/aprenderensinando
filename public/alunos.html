<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Alunos - Aprender Ensinando</title>
  <link rel="stylesheet" href="/css/modern-layout.css">
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar será inserida aqui -->
    <div id="sidebar-container"></div>

    <div class="main-content">
      <!-- Header será inserido aqui -->
      <div id="header-container"></div>

      <div class="page-content">
        <!-- Filtros e Busca -->
        <div class="card" style="margin-bottom: 2rem;">
          <div class="flex items-center justify-between" style="flex-wrap: wrap; gap: 1rem;">
            <div class="flex gap-md items-center" style="flex-wrap: wrap;">
              <div style="position: relative;">
                <input 
                  type="text" 
                  id="searchInput" 
                  placeholder="🔍 Buscar aluno..."
                  style="padding: 0.625rem 1rem 0.625rem 2.5rem; border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 0.875rem; min-width: 250px;">
              </div>
              
              <select id="filterStatus" style="padding: 0.625rem 1rem; border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 0.875rem;">
                <option value="">Todos os status</option>
                <option value="ativo">🟢 Ativos</option>
                <option value="inativo">⏸️ Inativos</option>
                <option value="concluido">✅ Concluídos</option>
              </select>
            </div>

            <div style="font-size: 0.875rem; color: var(--text-tertiary);">
              <strong id="totalAlunos">0</strong> alunos encontrados
            </div>
          </div>
        </div>

        <!-- Loading -->
        <div id="loadingState" style="text-align: center; padding: 4rem;">
          <div style="font-size: 3rem; margin-bottom: 1rem;">⏳</div>
          <p style="color: var(--text-tertiary);">Carregando alunos...</p>
        </div>

        <!-- Empty State -->
        <div id="emptyState" style="display: none; text-align: center; padding: 4rem;">
          <div style="font-size: 4rem; margin-bottom: 1rem;">👥</div>
          <h3 style="color: var(--text-primary); margin-bottom: 0.5rem;">Nenhum aluno encontrado</h3>
          <p style="color: var(--text-tertiary); margin-bottom: 2rem;">Comece cadastrando seu primeiro aluno!</p>
          <a href="/cadastro.html" class="btn btn-primary">
            ➕ Novo Cadastro
          </a>
        </div>

        <!-- Grid de Cards -->
        <div id="alunosGrid" class="cards-grid" style="display: none;"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase } from './js/supabase.js';
    import { renderSidebar, renderHeader, loadUserName } from './js/sidebar.js';

    // Renderizar layout
    document.getElementById('sidebar-container').innerHTML = renderSidebar('alunos');
    document.getElementById('header-container').innerHTML = renderHeader('Meus Alunos', '👥');
    loadUserName();

    let alunos = [];
    let alunosFiltrados = [];

    // Carregar alunos
    async function carregarAlunos() {
      try {
        const { data: user } = await supabase.auth.getUser();
        if (!user?.user) {
          window.location.href = '/login.html';
          return;
        }

        const { data, error } = await supabase
          .from('pacientes')
          .select('*')
          .eq('usuario_id', user.user.id)
          .order('created_at', { ascending: false });

        if (error) throw error;

        alunos = data || [];
        alunosFiltrados = alunos;

        document.getElementById('loadingState').style.display = 'none';

        if (alunos.length === 0) {
          document.getElementById('emptyState').style.display = 'block';
        } else {
          renderizarAlunos();
        }

      } catch (error) {
        console.error('Erro:', error);
        alert('Erro ao carregar alunos!');
      }
    }

    // Renderizar grid de cards
    function renderizarAlunos() {
      const grid = document.getElementById('alunosGrid');
      grid.style.display = 'grid';
      document.getElementById('totalAlunos').textContent = alunosFiltrados.length;

      if (alunosFiltrados.length === 0) {
        grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--text-tertiary);">Nenhum aluno encontrado com esses filtros.</p>';
        return;
      }

      grid.innerHTML = alunosFiltrados.map(aluno => {
        const idade = calcularIdade(aluno.data_nascimento);
        const status = aluno.status || 'ativo';
        const statusBadge = getStatusBadge(status);

        return `
          <div class="student-card" onclick="window.location.href='/editar-paciente.html?id=${aluno.id}'">
            <div class="student-card-header">
              ${aluno.foto_url 
                ? `<img src="${aluno.foto_url}" alt="${aluno.nome}" class="student-avatar">`
                : `<div class="student-avatar-placeholder">${aluno.nome.charAt(0).toUpperCase()}</div>`
              }
              <div class="student-info">
                <div class="student-name">${aluno.nome}</div>
                <div class="student-meta">${idade} anos • ID: ${aluno.id_aluno || aluno.id.slice(0, 8)}</div>
              </div>
              ${statusBadge}
            </div>

            <div class="student-card-body">
              ${aluno.nome_mae ? `
                <div class="student-detail">
                  <span>👩</span>
                  <span>${aluno.nome_mae}</span>
                </div>
              ` : ''}
              
              ${aluno.telefone ? `
                <div class="student-detail">
                  <span>📱</span>
                  <span>${aluno.telefone}</span>
                </div>
              ` : ''}

              ${status === 'concluido' && aluno.data_conclusao ? `
                <div class="student-detail">
                  <span>📅</span>
                  <span>Finalizado em ${new Date(aluno.data_conclusao).toLocaleDateString('pt-BR')}</span>
                </div>
              ` : ''}
            </div>

            <div class="student-card-footer">
              <button class="btn btn-secondary" style="flex: 1;" onclick="event.stopPropagation(); window.location.href='/historico-aluno.html?id=${aluno.id}'">
                📚 Histórico
              </button>
              <button class="btn btn-success" style="flex: 1;" onclick="event.stopPropagation(); abrirModalPagamento('${aluno.id}', '${aluno.nome}', ${aluno.valor_aula || 0}, ${aluno.dia_vencimento || 0}, '${aluno.forma_pagamento || ''}')">
                💰 Pagamento
              </button>
              <button class="btn btn-primary" style="flex: 1;" onclick="event.stopPropagation(); window.location.href='/editar-paciente.html?id=${aluno.id}'">
                ✏️ Editar
              </button>
            </div>
          </div>
        `;
      }).join('');
    }

    // Calcular idade
    function calcularIdade(dataNascimento) {
      if (!dataNascimento) return '-';
      const hoje = new Date();
      const nascimento = new Date(dataNascimento);
      let idade = hoje.getFullYear() - nascimento.getFullYear();
      const mes = hoje.getMonth() - nascimento.getMonth();
      if (mes < 0 || (mes === 0 && hoje.getDate() < nascimento.getDate())) {
        idade--;
      }
      return idade;
    }

    // Badge de status
    function getStatusBadge(status) {
      const badges = {
        ativo: '<span class="badge badge-success">🟢 Ativo</span>',
        inativo: '<span class="badge badge-warning">⏸️ Inativo</span>',
        concluido: '<span class="badge badge-info">✅ Concluído</span>'
      };
      return badges[status] || badges.ativo;
    }

    // Busca
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const termo = e.target.value.toLowerCase();
      filtrar(termo, document.getElementById('filterStatus').value);
    });

    // Filtro de status
    document.getElementById('filterStatus').addEventListener('change', (e) => {
      const termo = document.getElementById('searchInput').value.toLowerCase();
      filtrar(termo, e.target.value);
    });

    function filtrar(termo, status) {
      alunosFiltrados = alunos.filter(aluno => {
        const matchTermo = !termo || 
          aluno.nome.toLowerCase().includes(termo) ||
          aluno.nome_mae?.toLowerCase().includes(termo) ||
          aluno.telefone?.includes(termo);
        
        const matchStatus = !status || (aluno.status || 'ativo') === status;

        return matchTermo && matchStatus;
      });

      renderizarAlunos();
    }

    // Iniciar
    carregarAlunos();

    // ===== MODAL DE PAGAMENTO =====
    function abrirModalPagamento(alunoId, alunoNome, valorAula, diaVencimento, formaPagamento) {
      document.getElementById('alunoIdPagamento').value = alunoId;
      document.getElementById('alunoNomePagamento').textContent = alunoNome;
      document.getElementById('valorAulaPagamento').value = valorAula || '';
      document.getElementById('diaVencimentoPagamento').value = diaVencimento || '';
      document.getElementById('formaPagamentoPagamento').value = formaPagamento || '';
      
      document.getElementById('modalPagamento').style.display = 'block';
    }

    function fecharModalPagamento() {
      document.getElementById('modalPagamento').style.display = 'none';
    }

    document.getElementById('formPagamento').addEventListener('submit', async (e) => {
      e.preventDefault();

      const alunoId = document.getElementById('alunoIdPagamento').value;
      const valorAula = parseFloat(document.getElementById('valorAulaPagamento').value);
      const diaVencimento = parseInt(document.getElementById('diaVencimentoPagamento').value);
      const formaPagamento = document.getElementById('formaPagamentoPagamento').value;

      if (!valorAula || !diaVencimento || !formaPagamento) {
        alert('Preencha todos os campos obrigatórios');
        return;
      }

      try {
        const { error } = await sb
          .from('pacientes')
          .update({
            valor_aula: valorAula,
            dia_vencimento: diaVencimento,
            forma_pagamento: formaPagamento,
            cobranca_ativa: true
          })
          .eq('id', alunoId);

        if (error) throw error;

        alert('Configuração de pagamento salva com sucesso!');
        fecharModalPagamento();
        await carregarAlunos();

      } catch (error) {
        console.error('Erro ao salvar configuração:', error);
        alert('Erro ao salvar configuração de pagamento');
      }
    });

    // Fechar modal ao clicar fora
    document.getElementById('modalPagamento').addEventListener('click', (e) => {
      if (e.target.id === 'modalPagamento') {
        fecharModalPagamento();
      }
    });
  </script>

  <!-- Modal Configurar Pagamento -->
  <div id="modalPagamento" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; overflow-y: auto;">
    <div style="max-width: 500px; margin: 2rem auto; background: white; border-radius: var(--radius); padding: 2rem;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <h2>💰 Configurar Pagamento</h2>
        <button onclick="fecharModalPagamento()" class="btn btn-secondary">✕</button>
      </div>
      
      <form id="formPagamento">
        <input type="hidden" id="alunoIdPagamento">
        
        <div class="form-group">
          <label class="form-label">Aluno</label>
          <div id="alunoNomePagamento" style="font-weight: 600; color: var(--text-primary); margin-bottom: 1rem;"></div>
        </div>

        <div class="form-group">
          <label for="valorAulaPagamento" class="form-label required">Valor por Aula (R$)</label>
          <input type="number" id="valorAulaPagamento" class="form-control" step="0.01" min="0" placeholder="80.00" required>
        </div>

        <div class="form-group">
          <label for="diaVencimentoPagamento" class="form-label required">Dia de Vencimento</label>
          <select id="diaVencimentoPagamento" class="form-control" required>
            <option value="">Selecione o dia do mês</option>
            ${Array.from({length: 28}, (_, i) => `<option value="${i + 1}">${i + 1}</option>`).join('')}
          </select>
          <small style="color: var(--text-tertiary); font-size: 0.75rem;">
            Cobrança será gerada todo dia escolhido do mês
          </small>
        </div>

        <div class="form-group">
          <label for="formaPagamentoPagamento" class="form-label required">Forma de Pagamento</label>
          <select id="formaPagamentoPagamento" class="form-control" required>
            <option value="">Selecione...</option>
            <option value="PIX">PIX</option>
            <option value="Dinheiro">Dinheiro</option>
            <option value="Transferência">Transferência</option>
            <option value="Cartão">Cartão</option>
            <option value="Boleto">Boleto</option>
          </select>
        </div>

        <div class="btn-group" style="justify-content: flex-end; margin-top: 1.5rem;">
          <button type="button" onclick="fecharModalPagamento()" class="btn btn-secondary">Cancelar</button>
          <button type="submit" class="btn btn-primary">💾 Salvar</button>
        </div>
      </form>
    </div>
  </div>

</body>
</html>
