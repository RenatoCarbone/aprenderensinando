<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Alunos - Aprender Ensinando</title>
  <link rel="stylesheet" href="/css/modern-layout.css">
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar será inserida aqui -->
    <div id="sidebar-container"></div>

    <div class="main-content">
      <!-- Header será inserido aqui -->
      <div id="header-container"></div>

      <div class="page-content">
        <!-- Botão Voltar ao Dashboard -->
        <div style="margin-bottom: var(--spacing-lg);">
          <a href="/dashboard.html" class="btn btn-secondary" style="display: inline-flex; align-items: center; text-decoration: none; padding: 0.75rem 1.5rem; border-radius: 8px; font-size: 1rem;">
            ← Voltar ao Dashboard
          </a>
        </div>

        <!-- Filtros e Busca -->
        <div class="card" style="margin-bottom: 2rem;">
          <div class="flex items-center justify-between" style="flex-wrap: wrap; gap: 1rem;">
            <div class="flex gap-md items-center" style="flex-wrap: wrap;">
              <div style="position: relative;">
                <input 
                  type="text" 
                  id="searchInput" 
                  placeholder="🔍 Buscar aluno..."
                  style="padding: 0.75rem 1rem 0.75rem 2.5rem; border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 1rem; min-width: 250px;">
              </div>
              
              <select id="filterStatus" style="padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 1rem;">
                <option value="">Todos os status</option>
                <option value="ativo">🟢 Ativos</option>
                <option value="inativo">⏸️ Inativos</option>
                <option value="concluido">✅ Concluídos</option>
              </select>
            </div>

            <div style="font-size: 1rem; color: var(--text-tertiary);">
              <strong id="totalAlunos">0</strong> alunos encontrados
            </div>
          </div>
        </div>

        <!-- Loading -->
        <div id="loadingState" style="text-align: center; padding: 4rem;">
          <div style="font-size: 3rem; margin-bottom: 1rem;">⏳</div>
          <p style="color: var(--text-tertiary);">Carregando alunos...</p>
        </div>

        <!-- Empty State -->
        <div id="emptyState" style="display: none; text-align: center; padding: 4rem;">
          <div style="font-size: 4rem; margin-bottom: 1rem;">👥</div>
          <h3 style="color: var(--text-primary); margin-bottom: 0.5rem;">Nenhum aluno encontrado</h3>
          <p style="color: var(--text-tertiary); margin-bottom: 2rem;">Comece cadastrando seu primeiro aluno!</p>
          <a href="/cadastro.html" class="btn btn-primary">
            ➕ Novo Cadastro
          </a>
        </div>

        <!-- Grid de Cards -->
        <div id="alunosGrid" class="cards-grid" style="display: none;"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase } from './js/supabase.js';
    import { renderSidebar, renderHeader, loadUserName } from './js/sidebar.js';

    // Renderizar layout
    document.getElementById('sidebar-container').innerHTML = renderSidebar('alunos');
    document.getElementById('header-container').innerHTML = renderHeader('Meus Alunos', '👥');
    loadUserName();

    let alunos = [];
    let alunosFiltrados = [];

    // Carregar alunos
    async function carregarAlunos() {
      try {
        const { data: user } = await supabase.auth.getUser();
        if (!user?.user) {
          window.location.href = '/login.html';
          return;
        }

        const { data, error } = await supabase
          .from('pacientes')
          .select('*')
          .eq('usuario_id', user.user.id)
          .order('created_at', { ascending: false });

        if (error) throw error;

        alunos = data || [];
        alunosFiltrados = alunos;

        document.getElementById('loadingState').style.display = 'none';

        if (alunos.length === 0) {
          document.getElementById('emptyState').style.display = 'block';
        } else {
          renderizarAlunos();
        }

      } catch (error) {
        console.error('Erro:', error);
        alert('Erro ao carregar alunos!');
      }
    }

    // Renderizar grid de cards
    function renderizarAlunos() {
      const grid = document.getElementById('alunosGrid');
      grid.style.display = 'grid';
      document.getElementById('totalAlunos').textContent = alunosFiltrados.length;

      if (alunosFiltrados.length === 0) {
        grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--text-tertiary);">Nenhum aluno encontrado com esses filtros.</p>';
        return;
      }

      grid.innerHTML = alunosFiltrados.map(aluno => {
        const idade = calcularIdade(aluno.data_nascimento);
        const status = aluno.status || 'ativo';
        const statusBadge = getStatusBadge(status);

        return `
          <div class="student-card" onclick="window.location.href='/editar-paciente.html?id=${aluno.id}'">
            <div class="student-card-header">
              ${aluno.foto_url 
                ? `<img src="${aluno.foto_url}" alt="${aluno.nome}" class="student-avatar">`
                : `<div class="student-avatar-placeholder">${aluno.nome.charAt(0).toUpperCase()}</div>`
              }
              <div class="student-info">
                <div class="student-name">${aluno.nome}</div>
                <div class="student-meta">${idade} anos • ID: ${aluno.id_aluno || aluno.id.slice(0, 8)}</div>
              </div>
              ${statusBadge}
            </div>

            <div class="student-card-body">
              ${aluno.nome_mae ? `
                <div class="student-detail">
                  <span>👩</span>
                  <span>${aluno.nome_mae}</span>
                </div>
              ` : ''}
              
              ${aluno.telefone ? `
                <div class="student-detail">
                  <span>📱</span>
                  <span>${aluno.telefone}</span>
                </div>
              ` : ''}

              ${status === 'concluido' && aluno.data_conclusao ? `
                <div class="student-detail">
                  <span>📅</span>
                  <span>Finalizado em ${new Date(aluno.data_conclusao).toLocaleDateString('pt-BR')}</span>
                </div>
              ` : ''}
            </div>

            <div class="student-card-footer" style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;">
              <button class="btn btn-pagamento" data-aluno-id="${aluno.id}" data-aluno-nome="${aluno.nome}" data-valor-aula="${aluno.valor_aula || 0}" data-dia-vencimento="${aluno.dia_vencimento || 0}" data-forma-pagamento="${aluno.forma_pagamento || ''}" style="width: 100%; background: linear-gradient(135deg, #10B981 0%, #059669 100%); color: white; border: none;">
                💰 Pagamento
              </button>
              <button class="btn btn-primary" style="width: 100%;" onclick="event.stopPropagation(); window.location.href='/editar-paciente.html?id=${aluno.id}'">
                ✏️ Editar
              </button>
              <button class="btn btn-secondary" style="width: 100%;" onclick="event.stopPropagation(); window.location.href='/historico-aluno.html?id=${aluno.id}'">
                📚 Histórico
              </button>
              <button class="btn btn-contato" data-telefone="${aluno.telefone || aluno.telefone2 || ''}" style="width: 100%; background: #25D366; color: white;">
                📱 Contato
              </button>
            </div>
          </div>
        `;
      }).join('');
      
      // Adicionar event listeners nos botões de pagamento e contato
      setTimeout(() => {
        const btnsPagamento = document.querySelectorAll('.btn-pagamento');
        const btnsContato = document.querySelectorAll('.btn-contato');
        
        console.log('Botões de pagamento encontrados:', btnsPagamento.length);
        console.log('Botões de contato encontrados:', btnsContato.length);
        
        btnsPagamento.forEach(btn => {
          btn.addEventListener('click', function(e) {
            e.stopPropagation();
            console.log('Botão pagamento clicado!', this.dataset);
            const id = this.dataset.alunoId;
            const nome = this.dataset.alunoNome;
            const valor = this.dataset.valorAula;
            const dia = this.dataset.diaVencimento;
            const forma = this.dataset.formaPagamento;
            window.abrirModalPagamento(id, nome, valor, dia, forma);
          });
        });
        
        btnsContato.forEach(btn => {
          btn.addEventListener('click', function(e) {
            e.stopPropagation();
            console.log('Botão contato clicado!', this.dataset.telefone);
            const telefone = this.dataset.telefone;
            window.abrirWhatsApp(telefone);
          });
        });
      }, 100);
    }

    // Calcular idade
    function calcularIdade(dataNascimento) {
      if (!dataNascimento) return '-';
      const hoje = new Date();
      const nascimento = new Date(dataNascimento);
      let idade = hoje.getFullYear() - nascimento.getFullYear();
      const mes = hoje.getMonth() - nascimento.getMonth();
      if (mes < 0 || (mes === 0 && hoje.getDate() < nascimento.getDate())) {
        idade--;
      }
      return idade;
    }

    // Badge de status
    function getStatusBadge(status) {
      const badges = {
        ativo: '<span class="badge badge-success">🟢 Ativo</span>',
        inativo: '<span class="badge badge-warning">⏸️ Inativo</span>',
        concluido: '<span class="badge badge-info">✅ Concluído</span>'
      };
      return badges[status] || badges.ativo;
    }

    // Busca
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const termo = e.target.value.toLowerCase();
      filtrar(termo, document.getElementById('filterStatus').value);
    });

    // Filtro de status
    document.getElementById('filterStatus').addEventListener('change', (e) => {
      const termo = document.getElementById('searchInput').value.toLowerCase();
      filtrar(termo, e.target.value);
    });

    function filtrar(termo, status) {
      alunosFiltrados = alunos.filter(aluno => {
        const matchTermo = !termo || 
          aluno.nome.toLowerCase().includes(termo) ||
          aluno.nome_mae?.toLowerCase().includes(termo) ||
          aluno.telefone?.includes(termo);
        
        const matchStatus = !status || (aluno.status || 'ativo') === status;

        return matchTermo && matchStatus;
      });

      renderizarAlunos();
    }

    // Abrir WhatsApp (global)
    window.abrirWhatsApp = function(telefone) {
      if (!telefone) {
        alert('Este aluno não possui telefone cadastrado');
        return;
      }
      
      // Remover caracteres não numéricos
      const numeroLimpo = telefone.replace(/\D/g, '');
      
      // Abrir WhatsApp
      window.open(`https://wa.me/55${numeroLimpo}`, '_blank');
    }

    // ===== MODAL DE PAGAMENTO ===== (global)
    window.abrirModalPagamento = function(alunoId, alunoNome, valorAula, diaVencimento, formaPagamento) {
      console.log('Função abrirModalPagamento chamada com:', alunoId, alunoNome, valorAula, diaVencimento, formaPagamento);
      
      const modal = document.getElementById('modalPagamento');
      console.log('Modal encontrado:', modal);
      
      document.getElementById('alunoIdPagamento').value = alunoId;
      document.getElementById('alunoNomePagamento').textContent = alunoNome;
      document.getElementById('valorAulaPagamento').value = valorAula || '';
      document.getElementById('diaVencimentoPagamento').value = diaVencimento || '';
      document.getElementById('formaPagamentoPagamento').value = formaPagamento || '';
      
      modal.style.display = 'block';
      console.log('Modal aberto!');
    }

    window.fecharModalPagamento = function() {
      document.getElementById('modalPagamento').style.display = 'none';
    }

    document.getElementById('formPagamento').addEventListener('submit', async (e) => {
      e.preventDefault();

      const alunoId = document.getElementById('alunoIdPagamento').value;
      const valorAula = parseFloat(document.getElementById('valorAulaPagamento').value);
      const diaVencimento = parseInt(document.getElementById('diaVencimentoPagamento').value);
      const formaPagamento = document.getElementById('formaPagamentoPagamento').value;

      if (!valorAula || !diaVencimento || !formaPagamento) {
        alert('Preencha todos os campos obrigatórios');
        return;
      }

      try {
        const { error } = await supabase
          .from('pacientes')
          .update({
            valor_aula: valorAula,
            dia_vencimento: diaVencimento,
            forma_pagamento: formaPagamento,
            cobranca_ativa: true
          })
          .eq('id', alunoId);

        if (error) throw error;

        alert('Configuração de pagamento salva com sucesso!');
        fecharModalPagamento();
        await carregarAlunos();

      } catch (error) {
        console.error('Erro ao salvar configuração:', error);
        alert('Erro ao salvar configuração de pagamento');
      }
    });

    // Fechar modal ao clicar fora
    document.getElementById('modalPagamento').addEventListener('click', (e) => {
      if (e.target.id === 'modalPagamento') {
        fecharModalPagamento();
      }
    });

    // Iniciar
    carregarAlunos();

    // Verificar se deve abrir modal de pagamento automaticamente
    const urlParams = new URLSearchParams(window.location.search);
    const abrirPagamentoId = urlParams.get('abrir_pagamento');
    
    if (abrirPagamentoId) {
      const nome = urlParams.get('nome') || '';
      const valor = urlParams.get('valor') || 0;
      const dia = urlParams.get('dia') || 0;
      const forma = urlParams.get('forma') || '';
      
      // Aguardar um pouco para garantir que a página carregou
      setTimeout(() => {
        window.abrirModalPagamento(abrirPagamentoId, nome, valor, dia, forma);
        
        // Limpar URL para não reabrir ao recarregar
        window.history.replaceState({}, document.title, '/alunos.html');
      }, 500);
    }
  </script>

  <!-- Modal Configurar Pagamento -->
  <div id="modalPagamento" style="display: none; position: fixed !important; top: 0 !important; left: 0 !important; width: 100% !important; height: 100% !important; background: rgba(0,0,0,0.6) !important; z-index: 9999 !important; overflow-y: auto !important; padding: 20px !important;">
    <div style="max-width: 600px; margin: 2rem auto !important; background: white !important; border-radius: 16px !important; box-shadow: 0 25px 50px rgba(0,0,0,0.25) !important; overflow: hidden !important;">
      
      <!-- Header -->
      <div style="background: linear-gradient(135deg, #4FBECD 0%, #3A9BAA 100%); color: white; padding: 1.75rem 2rem; display: flex; justify-content: space-between; align-items: center;">
        <h2 style="color: white; font-size: 1.5rem; margin: 0; font-weight: 700;">💰 Configurar Pagamento</h2>
        <button onclick="fecharModalPagamento()" style="background: rgba(255,255,255,0.2); border: none; color: white; font-size: 1.5rem; width: 36px; height: 36px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.3)'" onmouseout="this.style.background='rgba(255,255,255,0.2)'">✕</button>
      </div>
      
      <form id="formPagamento">
        <div class="modal-body" style="padding: 2rem;">
          <input type="hidden" id="alunoIdPagamento">
          
          <!-- Aluno em destaque -->
          <div style="background: linear-gradient(135deg, #F0F9FF 0%, #E0F2FE 100%); padding: 1.25rem; border-radius: 12px; margin-bottom: 1.5rem; border-left: 4px solid var(--primary);">
            <div style="font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.25rem;">Aluno Selecionado</div>
            <div id="alunoNomePagamento" style="font-weight: 700; color: var(--primary); font-size: 1.25rem;"></div>
          </div>

          <!-- Grid de campos -->
          <div style="display: grid; gap: 1.25rem;">
            <div class="form-group" style="margin-bottom: 0;">
              <label for="valorAulaPagamento" class="form-label required" style="display: flex; align-items: center; gap: 0.5rem; font-weight: 600; margin-bottom: 0.5rem;">
                <span style="font-size: 1.25rem;">💵</span>
                <span>Valor por Aula</span>
              </label>
              <input type="number" id="valorAulaPagamento" class="form-control" step="0.01" min="0" placeholder="Ex: 80.00" required style="font-size: 1rem; padding: 0.75rem 1rem;">
              <small style="color: var(--text-tertiary); font-size: 0.75rem; display: block; margin-top: 0.35rem;">Valor cobrado por aula realizada</small>
            </div>

            <div class="form-group" style="margin-bottom: 0;">
              <label for="diaVencimentoPagamento" class="form-label required" style="display: flex; align-items: center; gap: 0.5rem; font-weight: 600; margin-bottom: 0.5rem;">
                <span style="font-size: 1.25rem;">📅</span>
                <span>Dia de Vencimento</span>
              </label>
              <select id="diaVencimentoPagamento" class="form-control" required style="font-size: 1rem; padding: 0.75rem 1rem;">
                <option value="">Selecione o dia do mês</option>
                <option value="1">Dia 1</option>
                <option value="5">Dia 5</option>
                <option value="10">Dia 10</option>
                <option value="15">Dia 15</option>
                <option value="20">Dia 20</option>
                <option value="25">Dia 25</option>
                <option value="28">Dia 28</option>
              </select>
              <small style="color: var(--text-tertiary); font-size: 0.75rem; display: block; margin-top: 0.35rem;">
                <span style="color: #10B981;">💡</span> Cobrança gerada automaticamente neste dia todo mês
              </small>
            </div>

            <div class="form-group" style="margin-bottom: 0;">
              <label for="formaPagamentoPagamento" class="form-label required" style="display: flex; align-items: center; gap: 0.5rem; font-weight: 600; margin-bottom: 0.5rem;">
                <span style="font-size: 1.25rem;">💳</span>
                <span>Forma de Pagamento</span>
              </label>
              <select id="formaPagamentoPagamento" class="form-control" required style="font-size: 1rem; padding: 0.75rem 1rem;">
                <option value="">Selecione a forma de pagamento</option>
                <option value="PIX">🟢 PIX</option>
                <option value="Dinheiro">💵 Dinheiro</option>
                <option value="Transferência">🏦 Transferência Bancária</option>
                <option value="Cartão">💳 Cartão de Crédito/Débito</option>
                <option value="Boleto">📄 Boleto Bancário</option>
              </select>
            </div>
          </div>
        </div>

        <div style="padding: 1.5rem 2rem; background: #F9FAFB; border-top: 1px solid #E5E7EB; display: flex; gap: 1rem; justify-content: flex-end;">
          <button type="button" onclick="fecharModalPagamento()" style="padding: 0.75rem 1.5rem; background: #6B7280; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s;" onmouseover="this.style.background='#4B5563'" onmouseout="this.style.background='#6B7280'">
            Cancelar
          </button>
          <button type="submit" style="padding: 0.75rem 1.5rem; background: linear-gradient(135deg, #4FBECD 0%, #3A9BAA 100%); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 12px rgba(79, 190, 205, 0.3);" onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 16px rgba(79, 190, 205, 0.4)'" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 12px rgba(79, 190, 205, 0.3)'">
            💾 Salvar Configuração
          </button>
        </div>
      </form>
    </div>
  </div>

</body>
</html>
