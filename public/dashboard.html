<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Aprender Ensinando</title>
  <link rel="stylesheet" href="/css/modern-layout.css">
  <style>
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      padding: 1.5rem;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-md);
      transition: all var(--transition-base);
    }

    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-xl);
    }

    .stat-card.secondary {
      background: linear-gradient(135deg, var(--secondary) 0%, #5568d3 100%);
    }

    .stat-card.accent {
      background: linear-gradient(135deg, var(--accent) 0%, #ec4899 100%);
    }

    .stat-label {
      font-size: 0.875rem;
      opacity: 0.9;
      margin-bottom: 0.5rem;
      font-weight: 500;
    }

    .stat-value {
      font-size: 2.5rem;
      font-weight: 700;
      line-height: 1;
    }

    .quick-actions {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .action-button {
      background: white;
      border: 2px solid var(--border-light);
      padding: 1.25rem;
      border-radius: var(--radius-lg);
      text-align: center;
      text-decoration: none;
      color: var(--text-primary);
      transition: all var(--transition-base);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      align-items: center;
    }

    .action-button:hover {
      border-color: var(--primary);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .action-icon {
      font-size: 2rem;
    }

    .action-label {
      font-weight: 600;
      font-size: 0.9375rem;
    }

    .timeline-item {
      display: flex;
      gap: 1rem;
      padding: 1rem;
      border-radius: var(--radius-md);
      transition: all var(--transition-fast);
    }

    .timeline-item:hover {
      background: var(--bg-tertiary);
    }

    .timeline-time {
      font-size: 0.875rem;
      color: var(--text-tertiary);
      min-width: 100px;
    }

    .timeline-content {
      flex: 1;
    }

    .timeline-title {
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
    }

    .timeline-desc {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-container"></div>

    <div class="main-content">
      <div id="header-container"></div>

      <div class="page-content">
        <!-- Estatísticas -->
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">Total de Alunos</div>
            <div class="stat-value" id="totalAlunos">0</div>
          </div>
          <div class="stat-card secondary">
            <div class="stat-label">Aulas Hoje</div>
            <div class="stat-value" id="aulasHoje">0</div>
          </div>
          <div class="stat-card accent">
            <div class="stat-label">Aulas no Mês</div>
            <div class="stat-value" id="aulasMes">0</div>
          </div>
        </div>

        <!-- Ações Rápidas -->
        <div class="card" style="margin-bottom: 2rem;">
          <div class="card-header">
            <h2 class="card-title">⚡ Ações Rápidas</h2>
          </div>
          <div class="quick-actions">
            <a href="/cadastro.html" class="action-button">
              <span class="action-icon">➕</span>
              <span class="action-label">Novo Cadastro</span>
            </a>
            <a href="/registrar-aula.html" class="action-button">
              <span class="action-icon">📚</span>
              <span class="action-label">Nova Aula</span>
            </a>
            <a href="/agenda.html" class="action-button">
              <span class="action-icon">📅</span>
              <span class="action-label">Agendar Aula</span>
            </a>
            <a href="/alunos.html" class="action-button">
              <span class="action-icon">👥</span>
              <span class="action-label">Ver Alunos</span>
            </a>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 1.5rem;">
          <!-- Próximas Aulas -->
          <div class="card">
            <div class="card-header">
              <h2 class="card-title">📅 Aulas Agendadas</h2>
            </div>
            <div id="proximasAulas">
              <p style="text-align: center; padding: 2rem; color: var(--text-tertiary);">Carregando...</p>
            </div>
          </div>

          <!-- Alunos Recentes -->
          <div class="card">
            <div class="card-header">
              <h2 class="card-title">👥 Alunos Recentes</h2>
            </div>
            <div id="alunosRecentes">
              <p style="text-align: center; padding: 2rem; color: var(--text-tertiary);">Carregando...</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase } from './js/supabase.js';
    import { renderSidebar, renderHeader, loadUserName } from './js/sidebar.js';

    document.getElementById('sidebar-container').innerHTML = renderSidebar('dashboard');
    document.getElementById('header-container').innerHTML = renderHeader('Dashboard', '🏠');
    loadUserName();

    async function carregarDashboard() {
      try {
        const { data: user } = await supabase.auth.getUser();
        if (!user?.user) {
          window.location.href = '/login.html';
          return;
        }

        // Total de alunos
        const { count: totalAlunos } = await supabase
          .from('pacientes')
          .select('*', { count: 'exact', head: true })
          .eq('usuario_id', user.user.id);

        document.getElementById('totalAlunos').textContent = totalAlunos || 0;

        // Aulas hoje
        const hoje = new Date();
        const ano = hoje.getFullYear();
        const mes = String(hoje.getMonth() + 1).padStart(2, '0');
        const dia = String(hoje.getDate()).padStart(2, '0');
        const dataHoje = `${ano}-${mes}-${dia}`;

        const { count: aulasHoje } = await supabase
          .from('agendamentos')
          .select('*', { count: 'exact', head: true })
          .gte('data_hora', `${dataHoje} 00:00:00`)
          .lte('data_hora', `${dataHoje} 23:59:59`)
          .eq('usuario_id', user.user.id);

        document.getElementById('aulasHoje').textContent = aulasHoje || 0;

        // Aulas no mês
        const primeiroDia = `${ano}-${mes}-01`;
        const ultimoDia = `${ano}-${mes}-31`;

        const { count: aulasMes } = await supabase
          .from('aulas')
          .select('*', { count: 'exact', head: true })
          .gte('data', primeiroDia)
          .lte('data', ultimoDia)
          .eq('profissional_id', user.user.id);

        document.getElementById('aulasMes').textContent = aulasMes || 0;

        // Próximas aulas
        const { data: proximasAulas } = await supabase
          .from('agendamentos')
          .select('*, pacientes(nome)')
          .gte('data_hora', `${dataHoje} 00:00:00`)
          .eq('usuario_id', user.user.id)
          .order('data_hora')
          .limit(5);

        renderProximasAulas(proximasAulas || []);

        // Alunos recentes
        const { data: alunosRecentes } = await supabase
          .from('pacientes')
          .select('*')
          .eq('usuario_id', user.user.id)
          .order('created_at', { ascending: false })
          .limit(5);

        renderAlunosRecentes(alunosRecentes || []);

      } catch (error) {
        console.error('Erro:', error);
      }
    }

    function renderProximasAulas(aulas) {
      const container = document.getElementById('proximasAulas');
      
      if (aulas.length === 0) {
        container.innerHTML = '<p style="text-align: center; padding: 2rem; color: var(--text-tertiary);">Nenhuma aula agendada</p>';
        return;
      }

      container.innerHTML = aulas.map(aula => {
        const dataHora = new Date(aula.data_hora);
        const hora = dataHora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', timeZone: 'America/Sao_Paulo' });
        const data = dataHora.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });

        return `
          <div class="timeline-item">
            <div class="timeline-time">
              <div style="font-weight: 600;">${hora}</div>
              <div>${data}</div>
            </div>
            <div class="timeline-content">
              <div class="timeline-title">${aula.pacientes?.nome || '💬 Avaliação Inicial'}</div>
              ${aula.observacoes ? `<div class="timeline-desc">${aula.observacoes}</div>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    function renderAlunosRecentes(alunos) {
      const container = document.getElementById('alunosRecentes');
      
      if (alunos.length === 0) {
        container.innerHTML = '<p style="text-align: center; padding: 2rem; color: var(--text-tertiary);">Nenhum aluno cadastrado</p>';
        return;
      }

      container.innerHTML = alunos.map(aluno => {
        const idade = calcularIdade(aluno.data_nascimento);
        
        return `
          <div class="timeline-item" onclick="window.location.href='/editar-paciente.html?id=${aluno.id}'" style="cursor: pointer;">
            <div style="min-width: 40px;">
              ${aluno.foto_url 
                ? `<img src="${aluno.foto_url}" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary);">`
                : `<div style="width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--primary-light), var(--primary)); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600;">${aluno.nome.charAt(0).toUpperCase()}</div>`
              }
            </div>
            <div class="timeline-content">
              <div class="timeline-title">${aluno.nome}</div>
              <div class="timeline-desc">${idade} anos ${aluno.telefone ? `• ${aluno.telefone}` : ''}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    function calcularIdade(dataNascimento) {
      if (!dataNascimento) return '-';
      const hoje = new Date();
      const nascimento = new Date(dataNascimento);
      let idade = hoje.getFullYear() - nascimento.getFullYear();
      const mes = hoje.getMonth() - nascimento.getMonth();
      if (mes < 0 || (mes === 0 && hoje.getDate() < nascimento.getDate())) {
        idade--;
      }
      return idade;
    }

    carregarDashboard();
  </script>
</body>
</html>
