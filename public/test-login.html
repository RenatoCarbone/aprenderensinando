<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Teste - Aprender Ensinando</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h1 class="login-title">🎓 Aprender Ensinando</h1>
        <p class="login-subtitle">Sistema de Gestão Psicopedagógica</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email" class="form-label required">E-mail</label>
          <input type="email" id="email" class="form-control" placeholder="seu@email.com" required>
        </div>

        <div class="form-group">
          <label for="password" class="form-label required">Senha</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>

        <div id="errorMessage" class="alert alert-danger hidden"></div>

        <button type="submit" class="btn btn-primary btn-block">Entrar</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function() {
      // Inicializar Supabase
      const sb = window.supabase.createClient(
        'https://ukjxekdwumfxilphrrmb.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVranhla2R3dW1meGlscGhycm1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NjM1ODQsImV4cCI6MjA4ODAzOTU4NH0.c68Cp_HYU53aeSoZyNUM6RiHSDFq0Y0sPxJEAyq1nQk'
      );

      const form = document.getElementById('loginForm');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const errorDiv = document.getElementById('errorMessage');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        errorDiv.classList.add('hidden');
        
        try {
          const { data, error } = await sb.auth.signInWithPassword({
            email: emailInput.value.trim(),
            password: passwordInput.value
          });

          if (error) throw error;

          alert('Login bem-sucedido!');
          
        } catch (error) {
          console.error('Erro:', error);
          errorDiv.textContent = 'Erro ao fazer login: ' + error.message;
          errorDiv.classList.remove('hidden');
        }
      });
    })();
  </script>
</body>
</html>
